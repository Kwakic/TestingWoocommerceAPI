stages:
  - discover
  - test

# -----------------------------------------------------------------------------
# Global defaults
# -----------------------------------------------------------------------------
.default-python:
  image: docker:27
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    ENV: docker
  before_script:
    - apk add --no-cache python3 py3-pip docker-compose curl
    - pip3 install --upgrade pip

# -----------------------------------------------------------------------------
# Discover entity test folders dynamically
# -----------------------------------------------------------------------------
discover_services:
  stage: discover
  image: python:3.11
  script:
    - |
      services=$(find tests -maxdepth 1 -mindepth 1 -type d \
        ! -name shared -printf '%f\n')
      if [ -z "$services" ]; then
        echo "No services found"
        exit 1
      fi

      echo "stages: [test]" > matrix.yml

      for s in $services; do
        cat >> matrix.yml <<EOF
${s}_tests:
  stage: test
  extends: .default-python
  variables:
    SERVICE: ${s}
  script:
    - docker compose -f docker-compose.wp.yml up -d
    - echo "Waiting for WordPress…"
    - |
      for i in {1..40}; do
        curl -f http://wordpress >/dev/null 2>&1 && break
        sleep 3
      done
    - pip3 install -e './EcommerceAPI[dev]'
    - mkdir -p reports/${s}
    - pytest tests/${s} -s --maxfail=3 \
        --alluredir=reports/${s}/allure-results
  after_script:
    - docker compose -f docker-compose.wp.yml down -v
  artifacts:
    when: always
    paths:
      - reports/${s}/

EOF
      done
  artifacts:
    paths: [matrix.yml]

# -----------------------------------------------------------------------------
# Run generated matrix
# -----------------------------------------------------------------------------
entity_tests:
  stage: test
  trigger:
    include:
      - artifact: matrix.yml
        job: discover_services
