# -----------------------------------------------------------------------------
# GitLab CI: WooCommerce API + DB Tests
# -----------------------------------------------------------------------------
stages:
  - discover
  - test

# -----------------------------------------------------------------------------
# Global defaults for Python jobs with Docker-in-Docker
# -----------------------------------------------------------------------------
.default-python:
  image: docker:27
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    ENV: docker
  before_script:
    # Install Python, pip, docker-compose, curl
    - apk add --no-cache python3 py3-pip docker-compose curl
    - pip3 install --upgrade pip

# -----------------------------------------------------------------------------
# Discover entity test folders dynamically
# Generates a matrix.yml to trigger one job per entity
# -----------------------------------------------------------------------------
discover_services:
  stage: discover
  image: python:3.11
  tags:
    - pytest
  script:
    - echo "🔍 Discovering entity test suites"
    - set -e

    - |
      if [ -n "$SERVICE" ]; then
        services="$SERVICE"
        echo "SERVICE override detected: $services"
      else
        services=$(find tests -maxdepth 1 -mindepth 1 -type d ! -name shared -printf '%f\n' | tr '\n' ' ')
      fi

      if [ -z "$services" ]; then
        echo "❌ No entity services found"
        exit 1
      fi

      echo "Detected services: $services"

    - echo "stages:" > matrix.yml
    - echo "  - test" >> matrix.yml

    - |
      for s in $services; do
        echo "${s}_test:" >> matrix.yml
        echo "  stage: test" >> matrix.yml
        echo "  image: python:3.11" >> matrix.yml

        # **FIX**: Better service configuration with explicit defaults
        echo "  services:" >> matrix.yml
        echo "    - name: mysql:8.0" >> matrix.yml
        echo "      alias: db" >> matrix.yml
        echo "      command:" >> matrix.yml
        echo "        - --default-authentication-plugin=mysql_native_password" >> matrix.yml
        echo "        - --character-set-server=utf8mb4" >> matrix.yml
        echo "        - --collation-server=utf8mb4_unicode_ci" >> matrix.yml
        
        echo "    - name: wordpress:6.8-php8.2-apache" >> matrix.yml
        echo "      alias: wordpress" >> matrix.yml

        echo "  variables:" >> matrix.yml
        echo "    SERVICE: \${s}" >> matrix.yml
        echo "    ENV: docker" >> matrix.yml
        echo "    MYSQL_ROOT_PASSWORD: root" >> matrix.yml
        echo "    MYSQL_DATABASE: wordpress" >> matrix.yml
        echo "    MYSQL_USER: wp" >> matrix.yml
        echo "    MYSQL_PASSWORD: wp" >> matrix.yml
        echo "    MYSQL_HOST_AUTHENTICATION_PLUGIN: mysql_native_password" >> matrix.yml
        echo "    WORDPRESS_DB_HOST: db:3306" >> matrix.yml
        echo "    WORDPRESS_DB_USER: wp" >> matrix.yml
        echo "    WORDPRESS_DB_PASSWORD: wp" >> matrix.yml
        echo "    WORDPRESS_DB_NAME: wordpress" >> matrix.yml
        echo "    WORDPRESS_TABLE_PREFIX: wp_" >> matrix.yml

        echo "  before_script:" >> matrix.yml
        echo "    - pip install --upgrade pip" >> matrix.yml
        echo "    - pip install -e './EcommerceAPI[dev]'" >> matrix.yml
        echo "    - apt-get update && apt-get install -y default-mysql-client curl" >> matrix.yml

        # **CRITICAL**: Check MySQL connectivity properly
        echo "    - echo '⏳ Waiting for MySQL to accept connections…'" >> matrix.yml
        echo "    - |" >> matrix.yml
        echo "      for i in {1..45}; do" >> matrix.yml
        echo "        if mysql -h db -P 3306 -u wp -pwp -D wordpress -e 'SELECT 1' >/dev/null 2>&1; then" >> matrix.yml
        echo "          echo '✅ MySQL is ready'" >> matrix.yml
        echo "          break" >> matrix.yml
        echo "        fi" >> matrix.yml
        echo "        echo \"⏳ Attempt \$i/45: MySQL not ready yet...\"" >> matrix.yml
        echo "        sleep 2" >> matrix.yml
        echo "      done" >> matrix.yml

        # **DIAGNOSTIC**: Show MySQL version to verify connectivity
        echo "    - mysql -h db -u wp -pwp -e 'SELECT VERSION();'" >> matrix.yml

        # **WAIT**: Actually wait for WordPress to become healthy
        echo "    - echo '⏳ Waiting for WordPress to initialize…'" >> matrix.yml
        echo "    - sleep 10" >> matrix.yml
        echo "    - |" >> matrix.yml
        echo "      for i in {1..30}; do" >> matrix.yml
        echo "        http_code=\$(curl -s -o /dev/null -w '%{http_code}' http://wordpress/ 2>/dev/null || echo '000')" >> matrix.yml
        echo "        if [ \"\$http_code\" != \"500\" ] && [ \"\$http_code\" != \"000\" ]; then" >> matrix.yml
        echo "          echo \"✅ WordPress responding (HTTP \$http_code)\"" >> matrix.yml
        echo "          break" >> matrix.yml
        echo "        fi" >> matrix.yml
        echo "        echo \"⏳ Attempt \$i/30: WordPress HTTP \$http_code\"" >> matrix.yml
        echo "        sleep 3" >> matrix.yml
        echo "      done" >> matrix.yml

        # **FINAL CHECK**: Verify database connectivity from WordPress
        echo "    - curl -s http://wordpress/ | grep -q 'WordPress' && echo '✅ WordPress HTML loaded' || echo '⚠️ WordPress not fully ready'" >> matrix.yml

        echo "  script:" >> matrix.yml
        echo "    - mkdir -p reports/${s}/allure-results" >> matrix.yml
        echo "    - pytest tests/${s} -s --maxfail=3 --alluredir=reports/${s}/allure-results" >> matrix.yml

        echo "  artifacts:" >> matrix.yml
        echo "    when: always" >> matrix.yml
        echo "    paths:" >> matrix.yml
        echo "      - reports/${s}/" >> matrix.yml
      done

  artifacts:
    paths:
      - matrix.yml

entity_tests:
  stage: test
  trigger:
    include:
      - artifact: matrix.yml
        job: discover_service
