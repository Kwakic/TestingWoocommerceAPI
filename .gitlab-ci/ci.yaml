# ============================================================
# GitLab CI — Dynamic Matrix Testing with Allure
# ============================================================
# Architecture:
# - Parent pipeline discovers services under tests/
# - Generates matrix.yml dynamically
# - Triggers child pipeline with one job per service
# - Each job runs pytest + Allure
#
# This design scales cleanly as services grow.
# ============================================================

stages:
  - discover
  - test

# ------------------------------------------------------------
# Global variables
# ------------------------------------------------------------
variables:
  PYTHON_VERSION: "3.11"
  REQUIRE_ENV: "true"

  # Logging
  ENABLE_STRUCTURED_LOGS: "true"
  ENABLE_JSON_PRETTY: "false"
  KEEP_STRUCTURED_LOGS: "3"
  LOG_DIR: "$CI_PROJECT_DIR/EcommerceAPI/tests/api/logs"

  REDACT_SENSITIVE_FIELDS: "true"
  LOG_PAYLOADS: "false"

  # Allure
  AUTO_ALLURE_REPORT: "true"

  # Performance / safety
  PERF_ITERATIONS: "5"
  FAIL_ON_EMPTY_LIST: "false"

  # Entity discovery
  STRICT_ENTITY_DISCOVERY: "true"

# ============================================================
# DISCOVER SERVICES
# ============================================================
discover_services:
  stage: discover
  image: python:3.11

  script:
    - echo "🔍 Discovering services under tests/"

    # --------------------------------------------------------
    # Service discovery
    # --------------------------------------------------------
    - |
      if [ -n "$SERVICE" ]; then
        services="$SERVICE"
        echo "SERVICE variable provided → running only: $services"
      else
        services=$(find tests -maxdepth 1 -mindepth 1 -type d -printf '%f\n' | tr '\n' ' ' | sed 's/ $//')
        echo "Detected services: $services"
      fi

    # --------------------------------------------------------
    # Generate child pipeline dynamically
    # --------------------------------------------------------
    - |
      echo "stages:" > matrix.yml
      echo "  - test" >> matrix.yml

      for s in $services; do
        echo "" >> matrix.yml
        echo "$s:" >> matrix.yml
        echo "  stage: test" >> matrix.yml
        echo "  image: python:3.11" >> matrix.yml
        echo "  variables:" >> matrix.yml
        echo "    TEAM: $s" >> matrix.yml
        echo "    ENV: test" >> matrix.yml
        echo "  script:" >> matrix.yml
        echo "    - pip install --upgrade pip" >> matrix.yml
        echo "    - pip install -e '.[dev]'" >> matrix.yml
        echo "    - mkdir -p reports/$s/allure-results" >> matrix.yml
        echo "    - pytest tests/$s -s --disable-warnings --maxfail=3 \\" >> matrix.yml
        echo "        --alluredir=reports/$s/allure-results \\" >> matrix.yml
        echo "        --junitxml=reports/$s/test-results.xml" >> matrix.yml

        echo "    - |" >> matrix.yml
        echo "      if [ \"$AUTO_ALLURE_REPORT\" = \"true\" ] && [ -d reports/$s/allure-results ] && [ \"\$(ls -A reports/$s/allure-results)\" ]; then" >> matrix.yml
        echo "        ALLURE_VER=\"2.27.0\"" >> matrix.yml
        echo "        curl -fsSL \"https://github.com/allure-framework/allure2/releases/download/\${ALLURE_VER}/allure-\${ALLURE_VER}.tgz\" | tar -xz" >> matrix.yml
        echo "        mv \"allure-\${ALLURE_VER}\" /opt/allure-\${ALLURE_VER}" >> matrix.yml
        echo "        ln -s /opt/allure-\${ALLURE_VER}/bin/allure /usr/bin/allure || true" >> matrix.yml
        echo "        allure generate reports/$s/allure-results -o reports/$s/allure-report --clean || true" >> matrix.yml
        echo "      else" >> matrix.yml
        echo "        echo \"No Allure results for $s — skipping HTML generation.\"" >> matrix.yml
        echo "      fi" >> matrix.yml

        echo "  artifacts:" >> matrix.yml
        echo "    when: always" >> matrix.yml
        echo "    paths:" >> matrix.yml
        echo "      - EcommerceAPI/tests/api/logs/**" >> matrix.yml
        echo "      - reports/**" >> matrix.yml
      done

  artifacts:
    paths:
      - matrix.yml

# ============================================================
# TRIGGER CHILD PIPELINE
# ============================================================
trigger_matrix:
  stage: test
  trigger:
    include:
      - artifact: matrix.yml
        job: discover_services
    strategy: depend
