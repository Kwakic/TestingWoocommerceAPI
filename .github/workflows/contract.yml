name: Contract Tests 📋

on:
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  contract:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e "./EcommerceAPI[dev]"

      - name: Start Docker stack
        run: |
          docker compose -f docker-compose.wp.yml up -d

      - name: Wait for MySQL
        run: |
          until nc -z 127.0.0.1 3306; do
            echo "Waiting for MySQL..."
            sleep 3
          done

      - name: Bootstrap WooCommerce
        run: bash scripts/setup.sh

      - name: Configure DB connection
        run: |
          echo "DB_USER=wp" >> $GITHUB_ENV
          echo "DB_PASSWORD=wp" >> $GITHUB_ENV
          echo "DB_HOST=127.0.0.1" >> $GITHUB_ENV
          echo "DB_PORT=3306" >> $GITHUB_ENV
          echo "DB_DATABASE=wordpress" >> $GITHUB_ENV

      - name: Configure CI environment
        run: |
          echo "ENABLE_STRUCTURED_LOGS=true" >> $GITHUB_ENV
          echo "API_ENV=ci" >> $GITHUB_ENV

      - name: Run contract tests
        run: |
          pytest \
            -m "contract" \
            -ra \
            --alluredir=reports/allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-allure-results
          path: reports/allure-results

      - name: Upload structured logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-logs
          path: reports/logs/**
