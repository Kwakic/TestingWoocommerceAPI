name: Contract Tests 📋
# Controls:
# orchestration
# dependencies
# permissions
# triggers


# ==================================================
# 🔁 Triggers
# ==================================================
on:
  # --------------------------------------------------
  # Run on crone job
  # --------------------------------------------------
  schedule:
    - cron: "0 2 * * *"  # 2 AM daily

#on:
#  # --------------------------------------------------
#  # Run on pushes to main branch
#  # --------------------------------------------------
#  push:
#    branches: [ main ]

  # --------------------------------------------------
  # Allow manual execution from GitHub UI
  # --------------------------------------------------
  workflow_dispatch:


jobs:

  # ==================================================
  # 🧪 JOB 1 — EXECUTE CONTRACT TESTS
  #
  # Delegates all shared CI logic to the reusable
  # enterprise test runner workflow.
  #
  # Shared responsibilities extracted:
  # - checkout
  # - python setup
  # - dependency install
  # - docker startup
  # - MySQL readiness
  # - WooCommerce bootstrap
  # - env configuration
  # - pytest execution
  # - artifact uploads
  # - docker cleanup
  # ==================================================
  test:

    uses: ./.github/workflows/reusable-test-runner.yml

    with:
      suite_name: contract
      pytest_markers: contract
      timeout_minutes: 15
      pytest_durations: 10
