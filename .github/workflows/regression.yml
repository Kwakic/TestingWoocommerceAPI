
name: Regression Tests 🔬
# Controls:
# orchestration
# dependencies
# permissions
# triggers
# concurrency

# ==================================================
# 🔁 Triggers
# ==================================================
on:
  # --------------------------------------------------
  # Run on crone job
  # --------------------------------------------------
  schedule:
    - cron: "0 2 * * *"  # 2 AM daily
  # --------------------------------------------------
  # Allow manual execution from GitHub UI
  # --------------------------------------------------
  workflow_dispatch:


jobs:

  # ==================================================
  # 🧪 JOB 1 — EXECUTE REGRESSION TESTS
  #
  # Delegates all shared CI logic to the reusable
  # enterprise test runner workflow.
  #
  # Shared responsibilities extracted:
  # - checkout
  # - python setup
  # - dependency install
  # - docker startup
  # - MySQL readiness
  # - WooCommerce bootstrap
  # - env configuration
  # - pytest execution
  # - artifact uploads
  # - docker cleanup
  # ==================================================
  test:

    uses: ./.github/workflows/reusable-test-runner.yml

    with:
      suite_name: regression
      pytest_markers: regression
      timeout_minutes: 45
      pytest_durations: 20

  # ==================================================
  # 📊 JOB 2 — GENERATE + PUBLISH ALLURE REPORT
  # ==================================================
  report:

    # --------------------------------------------------
    # 🔒 Prevent concurrent GitHub Pages deployments
    #
    # Only report jobs should serialize because
    # they deploy to the shared gh-pages branch.
    #
    # Test jobs can safely run in parallel.
    # --------------------------------------------------
    concurrency:
      group: pages-deploy
      cancel-in-progress: false

    needs: test

    permissions:
      contents: write


    uses: ./.github/workflows/reusable-allure-report.yml

    with:
      suite_name: regression
      report_timeout_minutes: 15
