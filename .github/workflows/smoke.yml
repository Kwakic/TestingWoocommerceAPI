
name: Smoke Tests 🔥

# ==================================================
# Controls:
# - orchestration
# - dependencies
# - permissions
# - triggers
# - concurrency
#
# Enterprise philosophy:
# Smoke tests validate critical business paths
# independently per entity/team.
#
# Each entity runs in isolated matrix jobs:
# - customers
# - orders
# - products
# - coupons
#
# This preserves:
# - ownership boundaries
# - failure isolation
# - independent diagnostics
# - future scalability
# ==================================================


# ==================================================
# 🔁 Triggers
# ==================================================
on:
  # --------------------------------------------------
  # Run on pushes to main branch
  #
  # Smoke suite acts as:
  # - deployment confidence gate
  # - operational confidence signal
  # - README badge source
  # --------------------------------------------------
  push:
    branches: [ main ]


  # --------------------------------------------------
  # Allow manual execution from GitHub UI
  # --------------------------------------------------
  workflow_dispatch:


jobs:

  # ==================================================
  # 🔍 JOB 0 — DISCOVER FRAMEWORK ENTITIES
  #
  # Single Source of Truth
  # ---------------------
  # The framework itself owns entity discovery.
  #
  # CI never maintains the list of entities.
  #
  # The framework is the Single Source of Truth.
  # Entity discovery is delegated to
  # EcommerceAPI.plugins.entities.discover_entity_names().
  #
  # Instead, it asks the framework which entities
  # are fully implemented.
  #
  # The resulting JSON matrix is consumed by all
  # downstream jobs.
  # ==================================================
  discover-entities:

    name: Discover framework entities

    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.discovery.outputs.matrix }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install framework
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e "./EcommerceAPI[dev]"

      # --------------------------------------------------
      # Build GitHub Actions matrix
      #
      # The framework is the Single Source of Truth for
      # entity discovery.
      #
      # The CI simply asks the framework which entities
      # are fully implemented and converts the result into
      # a GitHub Actions matrix.
      # --------------------------------------------------
      - id: discovery
        name: Build entity matrix
        shell: bash
        run: |
          MATRIX=$(python .github/scripts/generate_matrix.py)

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

          echo "=========================================="
          echo "Framework entities discovered"
          echo "$MATRIX"
  # ==================================================
  # 🧪 JOB 1 — EXECUTE SMOKE TESTS
  #
  # Matrix strategy:
  # One isolated job per entity/team.
  #
  # Enterprise rationale:
  # - independent ownership
  # - isolated failures
  # - parallel execution
  # - scalable architecture
  #
  # Delegates all shared CI logic to the reusable
  # enterprise test runner workflow.
  #
  # Shared responsibilities extracted:
  # - checkout
  # - python setup
  # - dependency install
  # - docker startup
  # - MySQL readiness
  # - WooCommerce bootstrap
  # - env configuration
  # - pytest execution
  # - artifact uploads
  # - docker cleanup
  # ==================================================

  test:

    needs: discover-entities

    # --------------------------------------------------
    # Matrix execution
    #
    # Each entity represents:
    # - ownership boundary
    # - deployment boundary
    # - reporting boundary
    #
    # IMPORTANT:
    # One entity failure must NOT cancel others.
    #
    # Example:
    # customers failure must NOT cancel:
    # - orders
    # - products
    # - coupons
    #
    # This preserves full diagnostic visibility.
    # --------------------------------------------------
    strategy:

      fail-fast: false

      matrix: ${{ fromJson(needs.discover-entities.outputs.matrix) }}

    uses: ./.github/workflows/reusable-test-runner.yml

    with:

      # --------------------------------------------------
      # Test suite metadata
      # --------------------------------------------------
      suite_name: smoke
      pytest_markers: smoke

      # --------------------------------------------------
      # Pytest runtime configuration
      # --------------------------------------------------
      timeout_minutes: 20
      pytest_durations: 10
      pytest_maxfail: 3

      # --------------------------------------------------
      # Entity ownership boundary
      #
      # Entity == Team == Microservice
      #
      # Examples:
      # - customers
      # - orders
      # - products
      # - coupons
      #
      # Passed to reusable-test-runner.yml
      # for:
      # - entity-specific test execution
      # - entity-specific reporting
      # - entity-specific artifacts
      # - ownership isolation
      # --------------------------------------------------
      entity: ${{ matrix.entity }}


  # ==================================================
  # 📊 JOB 2 — GENERATE + PUBLISH ALLURE REPORT
  # ==================================================
  publish-report:

    needs:
      - discover-entities
      - test

    strategy:

      fail-fast: false

      matrix: ${{ fromJson(needs.discover-entities.outputs.matrix) }}

#    concurrency:
#      group: pages-deploy-${{ matrix.entity }}
#      cancel-in-progress: false

    permissions:
      contents: write

    uses: ./.github/workflows/reusable-allure-report.yml

    with:
      suite_name: smoke
      report_timeout_minutes: 10
      entity: ${{ matrix.entity }}
