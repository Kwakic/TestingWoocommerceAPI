
name: Smoke Tests 🔥

# ==================================================
# Controls:
# - orchestration
# - dependencies
# - permissions
# - triggers
# - concurrency
#
# Enterprise philosophy:
# Smoke tests validate critical business paths
# independently per entity/team.
#
# Each entity runs in isolated matrix jobs:
# - customers
# - orders
# - products
# - coupons
#
# This preserves:
# - ownership boundaries
# - failure isolation
# - independent diagnostics
# - future scalability
# ==================================================


# ==================================================
# 🔁 Triggers
# ==================================================
on:
  # --------------------------------------------------
  # Run on pushes to main branch
  #
  # Smoke suite acts as:
  # - deployment confidence gate
  # - operational confidence signal
  # - README badge source
  # --------------------------------------------------
  push:
    branches: [ main ]


  # --------------------------------------------------
  # Allow manual execution from GitHub UI
  # --------------------------------------------------
  workflow_dispatch:


jobs:

  # ==================================================
  # 🧪 JOB 1 — EXECUTE SMOKE TESTS
  #
  # Matrix strategy:
  # One isolated job per entity/team.
  #
  # Enterprise rationale:
  # - independent ownership
  # - isolated failures
  # - parallel execution
  # - scalable architecture
  #
  # Delegates all shared CI logic to the reusable
  # enterprise test runner workflow.
  #
  # Shared responsibilities extracted:
  # - checkout
  # - python setup
  # - dependency install
  # - docker startup
  # - MySQL readiness
  # - WooCommerce bootstrap
  # - env configuration
  # - pytest execution
  # - artifact uploads
  # - docker cleanup
  # ==================================================
  test:

    # --------------------------------------------------
    # Matrix execution
    #
    # Each entity represents:
    # - ownership boundary
    # - deployment boundary
    # - reporting boundary
    #
    # IMPORTANT:
    # One entity failure must NOT cancel others.
    #
    # Example:
    # customers failure must NOT cancel:
    # - orders
    # - products
    # - coupons
    #
    # This preserves full diagnostic visibility.
    # --------------------------------------------------
    strategy:

      fail-fast: false

      matrix:
        entity:
          - customers
          - orders
          - products
          - coupons

    uses: ./.github/workflows/reusable-test-runner.yml

    with:

      # --------------------------------------------------
      # Test suite metadata
      # --------------------------------------------------
      suite_name: smoke
      pytest_markers: smoke

      # --------------------------------------------------
      # Pytest runtime configuration
      # --------------------------------------------------
      timeout_minutes: 20
      pytest_durations: 10
      pytest_maxfail: 3

      # --------------------------------------------------
      # Entity ownership boundary
      #
      # Entity == Team == Microservice
      #
      # Examples:
      # - customers
      # - orders
      # - products
      # - coupons
      #
      # Passed to reusable-test-runner.yml
      # for:
      # - entity-specific test execution
      # - entity-specific reporting
      # - entity-specific artifacts
      # - ownership isolation
      # --------------------------------------------------
      entity: ${{ matrix.entity }}


  # ==================================================
  # 📊 JOB 2 — GENERATE + PUBLISH ALLURE REPORT
  # ==================================================
  report:

    strategy:

      fail-fast: false

      matrix:
        entity:
          - customers
#          - orders
#          - products
#          - coupons

    concurrency:
      group: pages-deploy-${{ matrix.entity }}
      cancel-in-progress: false

    needs: test

    permissions:
      contents: write

    uses: ./.github/workflows/reusable-allure-report.yml

    with:
      suite_name: smoke
      report_timeout_minutes: 10
      entity: ${{ matrix.entity }}
