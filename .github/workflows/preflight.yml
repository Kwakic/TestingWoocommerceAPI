name: Preflight Checks ⚡

on:
  # Run on pull requests (any branch)
  pull_request:  # Every PR

  workflow_dispatch:  # Allow manual execution from GitHub UI

jobs:

  # ==================================================
  # ⚡ PRE-FLIGHT VALIDATION
  #
  # Purpose:
  #
  # Validate framework startup before expensive
  # infrastructure-dependent suites execute.
  #
  # Examples:
  #
  # - framework imports
  # - environment loading
  # - logging bootstrap
  # - fixture sanity checks
  # - basic connectivity validation
  #
  # Ownership:
  #
  # Platform Domain
  #
  # Unlike smoke/integration/regression,
  # preflight is NOT entity-owned and
  # therefore does NOT participate in
  # entity matrix execution.
  #
  # Enterprise rationale:
  #
  # Fail fast before:
  #
  # - Docker startup
  # - integration testing
  # - regression execution
  # - performance validation
  #
  # This keeps developer feedback fast
  # and CI costs low.
  # ==================================================
  preflight:

    permissions:
      contents: read

    uses: ./.github/workflows/reusable-test-runner.yml

    with:

      suite_name: preflight

      pytest_markers: preflight

      timeout_minutes: 5

      pytest_durations: 5

      pytest_maxfail: "1"

      pytest_extra_args: "-v"
