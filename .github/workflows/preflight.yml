name: Preflight Checks ⚡

on:
  # Run on pull requests (any branch)
  pull_request:  # Every PR
  push:
    branches: [ main ]

  workflow_dispatch:  # Allow manual execution from GitHub UI

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e "./EcommerceAPI[dev]"

      - name: Run preflight suite
        run: |
          pytest \
            -m "preflight" \
            -ra \
            -v \
            --maxfail=1 \
            --durations=5 \
            --clean-alluredir \
            --junitxml=reports/junit/results.xml \
            --alluredir=reports/allure-results

      # --------------------------------------------------
      # Upload Allure raw results
      # --------------------------------------------------
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-allure-results
          path: reports/allure-results
          if-no-files-found: warn

      # --------------------------------------------------
      # Upload JUnit XML
      # --------------------------------------------------
      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-junit-results
          path: reports/junit/results.xml
          if-no-files-found: warn

      # --------------------------------------------------
      # Upload structured logs
      # --------------------------------------------------
      - name: Upload structured logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-structured-logs
          path: reports/logs
          if-no-files-found: warn
