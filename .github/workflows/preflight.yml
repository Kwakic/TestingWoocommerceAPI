name: Preflight Checks ⚡

# ==================================================
# The philosophy:
#
# Preflight validates the framework itself before
# any infrastructure-dependent suites execute.
#
# It provides fast developer feedback and prevents
# expensive CI resources from being consumed when
# the framework cannot even start correctly.
# ==================================================

on:
  # Run on pull requests (any branch)
  pull_request:  # Every PR

  workflow_dispatch:  # Allow manual execution from GitHub UI

jobs:

  # ==================================================
  # ⚡ PRE-FLIGHT VALIDATION
  #
  # Framework validation workflow.
  #
  # Ultra-fast validation before expensive
  # infrastructure-dependent suites execute.
  #
  # Intentionally:
  #
  # - no Docker
  # - no WooCommerce bootstrap
  # - no MySQL startup
  #
  # Goal:
  #
  # Fail fast and provide rapid feedback
  # during pull request validation.
  # ==================================================
  preflight:

    permissions:
      contents: read

    uses: ./.github/workflows/reusable-test-runner.yml

    with:

      suite_name: preflight

      pytest_markers: preflight

      timeout_minutes: 5

      pytest_durations: 5

      pytest_maxfail: "1"

      pytest_extra_args: "-v"

      # No Docker or WordPress bootstrap required.
      #
      # Preflight validates the framework only.
      setup_woocommerce: false
