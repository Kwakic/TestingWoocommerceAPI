name: Integration Tests 🔗
# Controls:
# orchestration
# dependencies
# permissions
# triggers
# concurrency

# --------------------------------------------------
# 🔁 Triggers
# --------------------------------------------------
on:

  # --------------------------------------------------
  # Run on pushes to main branch
  # --------------------------------------------------
  push:
    branches: [ main ]

  # --------------------------------------------------
  # Allow manual execution from GitHub UI
  # --------------------------------------------------
  workflow_dispatch:


jobs:

  # ==================================================
  # 🧪 JOB 1 — EXECUTE INTEGRATION TESTS
  #
  # Delegates all shared CI logic to the reusable
  # enterprise test runner workflow.
  #
  # Shared responsibilities extracted:
  # - checkout
  # - python setup
  # - dependency install
  # - docker startup
  # - MySQL readiness
  # - WooCommerce bootstrap
  # - env configuration
  # - pytest execution
  # - artifact uploads
  # - docker cleanup
  # ==================================================
  test:

    uses: ./.github/workflows/reusable-test-runner.yml

    with:
      suite_name: integration
      pytest_markers: integration
      timeout_minutes: 25
      pytest_durations: 20
      pytest_maxfail: 5
      pytest_extra_args: "-v"


  # ==================================================
  # 📊 JOB 2 — GENERATE + PUBLISH ALLURE REPORT
  #
  # NOTE:
  # This job intentionally remains local for now.
  #
  # Why?
  # ----
  # GitHub Pages deployment and Allure history
  # restoration are more sensitive infrastructure
  # concerns and should be extracted separately
  # after the reusable test runner stabilizes.
  #
  # This is the safest enterprise migration strategy.
  # ==================================================
  report:

    # --------------------------------------------------
    # 🔒 Prevent concurrent GitHub Pages deployments
    #
    # Only report jobs should serialize because
    # they deploy to the shared gh-pages branch.
    #
    # Test jobs can safely run in parallel.
    # --------------------------------------------------
    concurrency:
      group: pages-deploy
      cancel-in-progress: false

    needs: test

    permissions:
      contents: write

    uses: ./.github/workflows/reusable-allure-report.yml

    with:
      suite_name: integration
      report_timeout_minutes: 10
