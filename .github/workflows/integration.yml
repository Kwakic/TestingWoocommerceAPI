name: Integration Tests 🔗
# Controls:
# orchestration
# dependencies
# permissions
# triggers
# concurrency

# --------------------------------------------------
# 🔁 Triggers
# --------------------------------------------------
on:

  # --------------------------------------------------
  # Run on pushes to main branch
  # --------------------------------------------------
#  push:
#    branches: [ main ]
#
  pull_request:  # Every PR


  # --------------------------------------------------
  # Allow manual execution from GitHub UI
  # --------------------------------------------------
  workflow_dispatch:


jobs:

  # ==================================================
  # 🧪 JOB 1 — EXECUTE SMOKE TESTS
  #
  # Matrix strategy:
  # One isolated job per entity/team.
  #
  # Enterprise rationale:
  # - independent ownership
  # - isolated failures
  # - parallel execution
  # - scalable architecture
  #
  # Delegates all shared CI logic to the reusable
  # enterprise test runner workflow.
  #
  # Shared responsibilities extracted:
  # - checkout
  # - python setup
  # - dependency install
  # - docker startup
  # - MySQL readiness
  # - WooCommerce bootstrap
  # - env configuration
  # - pytest execution
  # - artifact uploads
  # - docker cleanup
  # ==================================================
  test:

    # --------------------------------------------------
    # Matrix execution
    #
    # Each entity represents:
    # - ownership boundary
    # - deployment boundary
    # - reporting boundary
    #
    # IMPORTANT:
    # One entity failure must NOT cancel others.
    #
    # Example:
    # customers failure must NOT cancel:
    # - orders
    # - products
    # - coupons
    #
    # This preserves full diagnostic visibility.
    # --------------------------------------------------

    uses: ./.github/workflows/reusable-test-runner.yml

    with:

      # --------------------------------------------------
      # Test suite metadata
      # --------------------------------------------------
      suite_name: integration
      pytest_markers: integration

      # --------------------------------------------------
      # Pytest runtime configuration
      # --------------------------------------------------
      timeout_minutes: 25
      pytest_durations: 20
      pytest_maxfail: 5
      pytest_extra_args: "-v"

      # --------------------------------------------------
      # Entity ownership boundary
      #
      # Entity == Team == Microservice
      #
      # Passed to the reusable runner to isolate:
      # - test execution
      # - artifacts
      # - logs
      # - reports
      # --------------------------------------------------
      entity: ${{ matrix.entity }}


  # ==================================================
  # 📊 JOB 2 — GENERATE + PUBLISH ALLURE REPORT
  # ==================================================
  report:

    strategy:

      fail-fast: false

      matrix:
        entity:
          - customers
#          - orders
#          - products
#          - coupons

    concurrency:
      group: pages-deploy-${{ matrix.entity }}
      cancel-in-progress: false

    needs: test

    permissions:
      contents: write

    uses: ./.github/workflows/reusable-allure-report.yml

    with:
      suite_name: integration
      report_timeout_minutes: 10
      entity: ${{ matrix.entity }}
