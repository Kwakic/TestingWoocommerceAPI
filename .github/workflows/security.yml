name: Security Tests 🔒
# Controls:
# orchestration
# dependencies
# permissions
# triggers
# concurrency

# ==================================================
# 🔒 Prevent concurrent GitHub Pages deployments
# ==================================================
concurrency:
  group: pages-deploy
  cancel-in-progress: false

# ==================================================
# 🔁 Triggers
# ==================================================
on:
  schedule:
    - cron: "0 3 * * 0"  # Sunday 3 AM

  workflow_dispatch:


jobs:
 # ==================================================
  # 🧪 JOB 1 — EXECUTE SECURITY TESTS
  #
  # Delegates all shared CI logic to the reusable
  # enterprise test runner workflow.
  #
  # Shared responsibilities extracted:
  # - checkout
  # - python setup
  # - dependency install
  # - docker startup
  # - MySQL readiness
  # - WooCommerce bootstrap
  # - env configuration
  # - pytest execution
  # - artifact uploads
  # - docker cleanup
  # ==================================================
  test:

    uses: ./.github/workflows/reusable-test-runner.yml

    with:
      suite_name: security
      pytest_markers: security
      timeout_minutes: 15
      pytest_durations: 10
