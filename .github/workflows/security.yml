name: Security Tests 🔒
# Controls:
# orchestration
# dependencies
# permissions
# triggers


# ==================================================
# The philosophy:
#
# Security tests validate authentication,
# authorization and permission boundaries.
#
# Results are intentionally kept internal.
#
# Security diagnostics are published as CI
# artifacts only and are never exposed through
# the public GitHub Pages dashboard.
# ==================================================

# ==================================================
# 🔁 Triggers
# ==================================================
on:
  schedule:
    # Weekly execution keeps CI costs low while
    # providing regular security validation.
    #
    # Every Sunday at 03:00 UTC.
    - cron: "0 3 * * 0"

  workflow_dispatch:


jobs:
 # ==================================================
  # 🧪 JOB 1 — EXECUTE SECURITY TESTS
  #
  # Delegates all shared CI logic to the reusable
  # enterprise test runner workflow.
  #
  # Shared responsibilities extracted:
  # - checkout
  # - python setup
  # - dependency install
  # - docker startup
  # - MySQL readiness
  # - WooCommerce bootstrap
  # - env configuration
  # - pytest execution
  # - artifact uploads
  # - docker cleanup
  # ==================================================


  test:

    uses: ./.github/workflows/reusable-test-runner.yml

    with:
      suite_name: security
      pytest_markers: security  # Execute only security-focused tests.
      timeout_minutes: 15
      pytest_durations: 10
