name: Deploy GitHub Pages 🚀

# ==================================================
# TODO (Future Improvements)
#
# - Automatic artifact discovery across workflow runs
# - Automatic entity discovery
# - Automatic suite discovery
# - QA Portal enhancements
# - Remove manual workflow_dispatch
#
# Current Version:
# - Downloads report artifacts produced by the current workflow run.
# ==================================================

# ==================================================
# Purpose
#
# Single responsibility:
# Build and publish the GitHub Pages website.
#
# This workflow never executes tests.
# It only assembles already-generated reports.
#
# Enterprise architecture:
#
#   Smoke
#   Integration
#   Regression
#   Performance
#          │
#          ▼
#   Report Artifacts
#          │
#          ▼
#   Deploy QA Dashboard
#          │
#          ▼
#     GitHub Pages
#
# ==================================================

# ==================================================
# Trigger
#
# The dashboard is rebuilt whenever one of the public
# reporting workflows finishes successfully.
#
# Manual execution is kept for debugging and local
# verification.
# ==================================================

on:

  workflow_run:

    workflows:
      - "Smoke Tests 🔥"
      - "Integration Tests 🔗"
      - "Regression Tests 🔬"
      - "Performance Tests ⏱"

    types:
      - completed

  workflow_dispatch:

permissions:
  contents: write

jobs:

  deploy-dashboard:

    runs-on: ubuntu-latest

    steps:

      # --------------------------------------------------
      # Checkout repository
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Download report artifacts
      # --------------------------------------------------
      #
      # Reports are produced by another workflow
      # (Smoke, Integration, Regression, Performance).
      #
      # Since this workflow runs independently, it must
      # retrieve artifacts from the workflow that triggered
      # the deployment.
      # --------------------------------------------------

      - name: Download report artifacts
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Workflow run that triggered this deployment.
          run_id: ${{ github.event.workflow_run.id }}

          # Download every published report.
          name: report-*

          path: downloaded-reports

          search_artifacts: true


      # --------------------------------------------------
      # Verify downloaded artifacts
      # --------------------------------------------------
      #
      # Fail early if no reports were found.
      # This usually indicates that the triggering workflow
      # did not publish any report artifacts.
      # --------------------------------------------------

      - name: Verify downloaded artifacts
        shell: bash
        run: |

          echo "Downloaded artifacts"

          find downloaded-reports || true

          if [ ! -d downloaded-reports ]; then
            echo "No report artifacts found."
            exit 1
          fi

      # --------------------------------------------------
      # Build GitHub Pages website
      #
      # This is the heart of the deployment workflow.
      #
      # Responsibilities:
      #
      # 1. Copy the QA Portal.
      # 2. Discover every downloaded report artifact.
      # 3. Extract entity and suite names from the artifact.
      # 4. Rebuild the GitHub Pages directory structure.
      #
      # No entities or test suites are hardcoded.
      #
      # Example:
      #
      # report-customers-smoke
      #           │
      #           ▼
      # site/customers/smoke
      #
      # report-orders-regression
      #           │
      #           ▼
      # site/orders/regression
      #
      # --------------------------------------------------

      - name: Build website
        shell: bash
        run: |

          mkdir -p site

          # -----------------------------
          # Copy QA Portal
          # -----------------------------
          cp docs/portal/index.html site/index.html
          cp docs/portal/styles.css site/styles.css

          echo
          echo "===== Downloaded artifacts ====="
          find downloaded-reports

          echo
          echo "===== Building website ====="

          for artifact in downloaded-reports/report-*; do

            [ -d "$artifact" ] || continue

            artifact_name=$(basename "$artifact")

            # Remove the standard artifact prefix.
            #
            # report-customers-smoke
            #        ↓
            # customers-smoke
            name="${artifact_name#report-}"

            # Extract the entity name.
            #
            # customers-smoke
            # └────────┘
            entity="${name%-*}"

            # Extract the test suite.
            #
            # customers-smoke
            #           └───┘
            suite="${name##*-}"

            echo "Publishing $entity / $suite"

            mkdir -p "site/$entity/$suite"

            cp -R "$artifact"/. "site/$entity/$suite"

          done

          echo
          echo "===== Final site ====="

          find site

      # --------------------------------------------------
      # Debug generated website
      #
      # Temporary verification step.
      # Shows the final GitHub Pages structure before deployment.
      # Remove once the workflow is stable.
      # --------------------------------------------------

      - name: Debug generated website
        shell: bash
        run: |
          echo "=========================================="
          echo " GitHub Pages Website"
          echo "=========================================="

          pwd

          echo
          echo "Generated site:"
          find site | sort

          echo
          echo "Downloaded report artifacts:"
          find downloaded-reports | sort

      # --------------------------------------------------
      # Publish website
      # --------------------------------------------------

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          keep_files: false
