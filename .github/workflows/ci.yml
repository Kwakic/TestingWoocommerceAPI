
# The flow for failed test is:

# tests fail
#↓
#collect diagnostics
#↓
#generate reports
#↓
#publish reports
#↓
#mark pipeline failed at END
# --------------------------------------------------

name: CI — Docker + Pytest + Allure

# --------------------------------------------------
# 🔁 Triggers
# --------------------------------------------------
on:
  # Run on every push to main branch
  push:
    branches: [ main ]

  # Run on pull requests (any branch)
  pull_request:

  # Allow manual execution from GitHub UI
  workflow_dispatch:


jobs:

  # ==================================================
  # 🧪 JOB 1 — RUN TESTS + GENERATE ALLURE RESULTS
  # ==================================================
  test:
    runs-on: ubuntu-latest

    outputs:
      pytest_exit_code: ${{ steps.pytest_step.outputs.exit_code }}

    permissions:
      contents: write

    steps:
      # --------------------------------------------------
      # 1. Checkout repository
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Setup Python
      # --------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # --------------------------------------------------
      # 3. Install project dependencies
      # --------------------------------------------------
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e "./EcommerceAPI[dev]"

      # --------------------------------------------------
      # 4. Start Docker environment (WordPress + DB)
      # --------------------------------------------------
      - name: Start Docker stack
        run: |
          docker compose -f docker-compose.wp.yml up -d

      # --------------------------------------------------
      # 🔥 Wait for MySQL (prevents race condition)
      # --------------------------------------------------
      - name: Wait for MySQL
        run: |
          until nc -z 127.0.0.1 3306; do
            echo "Waiting for MySQL..."
            sleep 3
          done

      # --------------------------------------------------
      # 5. Bootstrap WooCommerce + capture API credentials
      # --------------------------------------------------
      - name: Bootstrap WooCommerce and capture credentials
        run: |
          set -e
          OUTPUT=$(bash scripts/setup.sh)

          echo "$OUTPUT"

          WC_KEY=$(echo "$OUTPUT" | grep "CONSUMER KEY" | awk '{print $3}')
          WC_SECRET=$(echo "$OUTPUT" | grep "CONSUMER SECRET" | awk '{print $3}')

          echo "WC_KEY=$WC_KEY" >> $GITHUB_ENV
          echo "WC_SECRET=$WC_SECRET" >> $GITHUB_ENV

      # --------------------------------------------------
      # 🔥 Configure DB connection (matches docker-compose)
      # --------------------------------------------------
      - name: Configure DB connection
        run: |
          echo "DB_USER=wp" >> $GITHUB_ENV
          echo "DB_PASSWORD=wp" >> $GITHUB_ENV
          echo "DB_HOST=127.0.0.1" >> $GITHUB_ENV
          echo "DB_PORT=3306" >> $GITHUB_ENV
          echo "DB_DATABASE=wordpress" >> $GITHUB_ENV
          echo "DB_TABLE_PREFIX=wp_" >> $GITHUB_ENV

      # --------------------------------------------------
      # 6. CI environment overrides
      # --------------------------------------------------
      - name: Configure environment (CI overrides)
        run: |
          echo "AUTO_ALLURE_REPORT=false" >> $GITHUB_ENV
          echo "ENABLE_STRUCTURED_LOGS=true" >> $GITHUB_ENV
          echo "STRICT_ENTITY_DISCOVERY=true" >> $GITHUB_ENV
          echo "REQUIRE_ENV=true" >> $GITHUB_ENV
          echo "SESSION_ID=${{ github.run_id }}" >> $GITHUB_ENV
          echo "API_ENV=ci" >> $GITHUB_ENV
#          echo "DISABLE_LOG_EMOJIS=true" >> $GITHUB_ENV

      # --------------------------------------------------
      # 7. Run pytest (generate Allure raw results)
      # --------------------------------------------------
      - name: Run pytest
        id: pytest_step
        continue-on-error: true
        run: |
          set +e

          pytest \
            -m "preflight or smoke or sanity or contract" \
            -ra \
            --durations=10 \
            --maxfail=3 \
            --clean-alluredir \
            --junitxml=reports/junit/results.xml \
            --alluredir=reports/allure-results

          EXIT_CODE=$?

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          exit 0


      # --------------------------------------------------
      # 8. Upload Allure raw results (artifact)
      # --------------------------------------------------
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results

      # --------------------------------------------------
      # 9. Upload structured logs (artifact)
      # --------------------------------------------------
      - name: Upload structured logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: structured-logs
          path: reports/logs/**


  # ==================================================
  # 📊 JOB 2 — GENERATE + PUBLISH ALLURE REPORT
  # ==================================================
  report:
    if: always()
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # --------------------------------------------------
      # 1. Checkout repository (main branch)
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Download Allure raw results from previous job
      # --------------------------------------------------
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results

      # --------------------------------------------------
      # 3. Checkout gh-pages branch (for history support)
      # --------------------------------------------------
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      # --------------------------------------------------
      # 4. Restore Allure history (trend charts)
      # --------------------------------------------------
      - name: Restore Allure history
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p reports/allure-results/history
            cp -r gh-pages/history/. reports/allure-results/history/
            echo "✅ Allure history restored"
          else
            echo "ℹ️ No previous Allure history found"
          fi

      # --------------------------------------------------
      # 5. Setup Java (required for Allure CLI)
      # --------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # --------------------------------------------------
      # 6. Install Allure CLI
      # --------------------------------------------------
      - name: Install Allure
        run: |
          curl -L -o allure.zip https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip
          unzip -q allure.zip
          echo "$PWD/allure-2.29.0/bin" >> $GITHUB_PATH

      # --------------------------------------------------
      # 7. Generate Allure HTML report
      # --------------------------------------------------
      - name: Generate Allure report
        run: |
          allure generate reports/allure-results -o reports/allure-report --clean

      # --------------------------------------------------
      # 8. Upload HTML report (artifact)
      # --------------------------------------------------
      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report

      # --------------------------------------------------
      # 9. Deploy report to GitHub Pages
      # --------------------------------------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/allure-report
          publish_branch: gh-pages   # ✅ explicit and safe
          keep_files: true

      # --------------------------------------------------
      # 10. Print report URL (clickable in logs)
      # --------------------------------------------------
      - name: Print Allure URL
        run: |
          echo "====================================="
          echo "Allure Report:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          echo "====================================="

      # --------------------------------------------------
      # 11. Mark workflow failed if pytest failed
      # --------------------------------------------------
      - name: Fail workflow if tests failed
        if: needs.test.outputs.pytest_exit_code != '0'
        run: |
          echo "❌ Tests failed"
          exit 1
