name: CI — Docker + Pytest + Allure

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  # ==================================================
  # 🧪 JOB 1 — TEST EXECUTION
  # ==================================================

  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # --------------------------------------------------
      # 1. Checkout repo
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Setup Python
      # --------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # --------------------------------------------------
      # 3. Install dependencies (FIXED PATH)
      # --------------------------------------------------
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e "./EcommerceAPI[dev]"

      # --------------------------------------------------
      # 4. Start Docker (instead of make run)
      # --------------------------------------------------
      - name: Start Docker stack
        run: |
          docker compose -f docker-compose.wp.yml up -d

#      # --------------------------------------------------
#      # 5. Wait for WordPress ---> you already have a readiness check inside setup.sh
#      # --------------------------------------------------
#      - name: Wait for WordPress
#        run: |
#          until curl -s http://localhost:8080/wp-json > /dev/null; do
#            echo "Waiting for WordPress..."
#            sleep 5
#          done

      # --------------------------------------------------
      # 6. Bootstrap WooCommerce
      # --------------------------------------------------
      - name: Bootstrap WooCommerce
        run: |
          bash scripts/setup.sh

      # --------------------------------------------------
      # 🔥 6.1 Copy .env from container to host
      # --------------------------------------------------
      - name: Copy .env from container to host
        run: |
          echo "Copying .env from container..."
          docker cp wc-wp:/var/www/html/.env .env
          echo "---- .env content ----"
          cat .env

      # --------------------------------------------------
      # 🔥 6.2 Map credentials to framework variables
      # --------------------------------------------------
      - name: Export credentials for tests
        run: |
          source .env
          echo "WC_KEY=$WC_CONSUMER_KEY" >> $GITHUB_ENV
          echo "WC_SECRET=$WC_CONSUMER_SECRET" >> $GITHUB_ENV

      # --------------------------------------------------
      # 7. CI ENV OVERRIDES (THIS IS WHAT YOU ASKED)
      # --------------------------------------------------
      - name: Configure environment (CI overrides)
        run: |
          echo "AUTO_ALLURE_REPORT=false" >> $GITHUB_ENV
          echo "ENABLE_STRUCTURED_LOGS=true" >> $GITHUB_ENV
          echo "STRICT_ENTITY_DISCOVERY=true" >> $GITHUB_ENV
          echo "REQUIRE_ENV=true" >> $GITHUB_ENV
          echo "SESSION_ID=${{ github.run_id }}" >> $GITHUB_ENV

      # --------------------------------------------------
      # 8. Run tests
      # --------------------------------------------------
      - name: Run pytest
        run: |
          pytest --clean-alluredir --alluredir=reports/allure-results

      # --------------------------------------------------
      # 9. Upload Allure results (RAW)
      # --------------------------------------------------
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results

  # ==================================================
  # 📊 JOB 2 — REPORT GENERATION + DEPLOY
  # ==================================================

  report:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # --------------------------------------------------
      # 1. Checkout repo (main branch)
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Download Allure results
      # --------------------------------------------------
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results

      # --------------------------------------------------
      # 3. Checkout gh-pages (history source)
      # --------------------------------------------------
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # --------------------------------------------------
      # 4. Restore history (if exists)
      # --------------------------------------------------
      - name: Restore Allure history
        run: |
          if [ -d "gh-pages/history" ]; then
            echo "Restoring history..."
            mkdir -p reports/allure-results/history
            cp -r gh-pages/history/* reports/allure-results/history/
          else
            echo "No previous history found"
          fi

      # --------------------------------------------------
      # 5. Setup Java
      # --------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # --------------------------------------------------
      # 6. Install Allure CLI
      # --------------------------------------------------
      - name: Install Allure
        run: |
          curl -L -o allure.zip https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip
          unzip -q allure.zip
          echo "$PWD/allure-2.29.0/bin" >> $GITHUB_PATH

      # --------------------------------------------------
      # 7. Generate report (WITH history)
      # --------------------------------------------------
      - name: Generate Allure report
        run: |
          allure generate reports/allure-results -o reports/allure-report --clean

      # --------------------------------------------------
      # 8. Upload artifact (optional)
      # --------------------------------------------------
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report

      # --------------------------------------------------
      # 9. Deploy to GitHub Pages
      # --------------------------------------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/allure-report
