name: Deploy GitHub Pages 🚀

# ==================================================
# TODO (Future Improvements)
#
# - Automatic artifact discovery across workflow runs
# - Automatic entity discovery
# - Automatic suite discovery
# - QA Portal enhancements
# - Remove manual workflow_dispatch
#
# Current Version:
# ==================================================
# Enterprise Deployment Philosophy
#
# Test execution and dashboard publication are
# intentionally decoupled.
#
# Test workflows only generate report artifacts.
#
# This workflow periodically rebuilds the public
# QA Portal from all available report artifacts.
#
# Benefits:
# - eliminates GitHub Pages deployment races
# - scales to any number of workflows
# - centralizes publication
# - mirrors enterprise CI/CD platforms
# ==================================================

# ==================================================
# Purpose
#
# Single responsibility:
# Build and publish the GitHub Pages website.
#
# This workflow never executes tests.
# It only assembles already-generated reports.
#
# Enterprise architecture:
#
#   Smoke
#   Integration
#   Regression
#   Performance
#          │
#          ▼
#   Report Artifacts
#          │
#          ▼
#   Deploy QA Dashboard
#          │
#          ▼
#     GitHub Pages
#
# ==================================================

# ==================================================
# Trigger
#
# The dashboard acts as a publishing service.
#
# Test workflows request publication once they have
# successfully generated their reports.
#
# The workflow may also be started manually from the
# GitHub Actions UI for debugging.
# ==================================================

on:

  workflow_dispatch:

  workflow_run:

    workflows:
      - Smoke Tests 🔥
      - Integration Tests 🔗
      - Regression Tests 🔬
      - Performance Tests ⏱

    types:
      - completed

permissions:
  contents: write

jobs:

  deploy-dashboard:

    concurrency:

      # --------------------------------------------------
      # Enterprise deployment queue
      #
      # GitHub Pages only allows a single deployment.
      #
      # Multiple workflows may request publication
      # simultaneously.
      #
      # Requests are queued rather than cancelled.
      #
      # This mirrors enterprise CI/CD deployment queues.
      # --------------------------------------------------
      group: github-pages-publisher

      cancel-in-progress: false

    runs-on: ubuntu-latest

    steps:

      # --------------------------------------------------
      # Checkout repository
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Download every generated HTML report.
      #
      # Artifact names follow the convention:
      #
      #   report-customers-smoke
      #   report-orders-smoke
      #   report-products-regression
      #
      # Therefore we search using a regular expression
      # instead of an exact artifact name.
      # --------------------------------------------------


      - name: Download report artifacts
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

          run_id: ${{ github.event.workflow_run.id }}

          search_artifacts: true

          # Treat the artifact name as a regular expression.
          name_is_regexp: true

          # Download every HTML report artifact.
          name: "^report-.*$"

          path: downloaded-reports




      # --------------------------------------------------
      # Verify downloaded artifacts
      # --------------------------------------------------
      #
      # Fail early if no reports were found.
      # This usually indicates that the triggering workflow
      # did not publish any report artifacts.
      # --------------------------------------------------

      - name: Verify downloaded artifacts
        shell: bash
        run: |

          echo "Downloaded artifacts"

          find downloaded-reports || true

          if [ ! -d downloaded-reports ]; then
            echo "No report artifacts found."
            exit 1
          fi

      # --------------------------------------------------
      # Build GitHub Pages website
      #
      # This is the heart of the deployment workflow.
      #
      # Responsibilities:
      #
      # 1. Copy the QA Portal.
      # 2. Discover every downloaded report artifact.
      # 3. Extract entity and suite names from the artifact.
      # 4. Rebuild the GitHub Pages directory structure.
      #
      # No entities or test suites are hardcoded.
      #
      # Example:
      #
      # report-customers-smoke
      #           │
      #           ▼
      # site/customers/smoke
      #
      # report-orders-regression
      #           │
      #           ▼
      # site/orders/regression
      #
      # --------------------------------------------------

      - name: Build website
        shell: bash
        run: |

          mkdir -p site

          # --------------------------------------------------
          # Copy QA Portal
          #
          # The portal acts as the landing page for all
          # published Allure reports.
          #
          # Source:
          #   docs/portal/
          #
          # Destination:
          #   site/
          # --------------------------------------------------

          mkdir -p site

          cp docs/portal/index.html site/
          cp docs/portal/style.css site/

          echo
          echo "===== Downloaded artifacts ====="
          find downloaded-reports

          echo
          echo "===== Building website ====="

          for artifact in downloaded-reports/report-*; do

            [ -d "$artifact" ] || continue

            artifact_name=$(basename "$artifact")

            # Remove the standard artifact prefix.
            #
            # report-customers-smoke
            #        ↓
            # customers-smoke
            name="${artifact_name#report-}"

            # Extract the entity name.
            #
            # customers-smoke
            # └────────┘
            entity="${name%-*}"

            # Extract the test suite.
            #
            # customers-smoke
            #           └───┘
            suite="${name##*-}"

            echo "Publishing $entity / $suite"

            mkdir -p "site/$entity/$suite"

            cp -R "$artifact"/. "site/$entity/$suite"

          done

          echo
          echo "===== Final site ====="

          find site

          echo
          echo "===== Portal ====="
          ls -R site

          echo
          echo "===== Smoke ====="
          ls -R site/customers || true

          echo
          echo "===== HTML ====="
          find site -name index.html

      # --------------------------------------------------
      # Debug generated website
      #
      # Temporary verification step.
      # Shows the final GitHub Pages structure before deployment.
      # Remove once the workflow is stable.
      # --------------------------------------------------

      - name: Debug generated website
        shell: bash
        run: |
          echo "=========================================="
          echo " GitHub Pages Website"
          echo "=========================================="

          pwd

          echo
          echo "Generated site:"
          find site | sort

          echo
          echo "Downloaded report artifacts:"
          find downloaded-reports | sort

      # --------------------------------------------------
      # Publish website
      # --------------------------------------------------

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          keep_files: false
