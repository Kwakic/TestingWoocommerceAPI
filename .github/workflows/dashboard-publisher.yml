name: Deploy GitHub Pages 🚀

# ==================================================
# GitHub Pages Publisher
#
# Enterprise design principle:
#
# Test execution and report publication are
# intentionally separated.
#
# Test workflows:
#   • execute tests
#   • generate Allure HTML
#   • upload report artifacts
#
# This workflow:
#   • downloads report artifacts
#   • rebuilds the QA Portal
#   • publishes GitHub Pages
#
# GitHub Pages allows only one deployment at a time.
# Therefore concurrent workflow executions may
# occasionally result in one deployment being
# cancelled. This is a GitHub Pages platform
# limitation rather than a framework limitation.
# ==================================================

# ==================================================
# Purpose
#
# Single responsibility:
#
# Assemble every generated Allure report into a
# single GitHub Pages website.
#
# No tests are executed here.
#
# This workflow only consumes artifacts produced
# by the individual test suites.
# ==================================================
#
# Enterprise architecture:
#
#   Smoke
#   Integration
#   Regression
#   Performance
#          │
#          ▼
#   Report Artifacts
#          │
#          ▼
#   Deploy QA Dashboard
#          │
#          ▼
#     GitHub Pages
#
# ==================================================

# ==================================================
# Trigger
#
# The workflow is started automatically whenever a
# report-producing workflow completes.
#
# A manual trigger is also available for debugging
# or republishing existing report artifacts.
# ==================================================

on:

  workflow_dispatch:

  workflow_run:

    workflows:
      - Smoke Tests 🔥
      - Integration Tests 🔗
      - Regression Tests 🔬
      - Performance Tests ⏱

    types:
      - completed

permissions:
  contents: write

jobs:

  deploy-dashboard:

    concurrency:

      # --------------------------------------------------
      # GitHub Pages deployment queue
      #
      # GitHub Pages accepts only one deployment at a time.
      #
      # Queue deployment requests instead of cancelling
      # them when multiple workflows finish together.
      # --------------------------------------------------
      group: github-pages-publisher

      cancel-in-progress: false

    runs-on: ubuntu-latest

    steps:

      # --------------------------------------------------
      # Checkout repository
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Download every generated HTML report.
      #
      # Artifact names follow the convention:
      #
      #   report-customers-smoke
      #   report-orders-smoke
      #   report-products-regression
      #
      # Therefore we search using a regular expression
      # instead of an exact artifact name.
      # --------------------------------------------------


      - name: Download report artifacts
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

          run_id: ${{ github.event.workflow_run.id }}

          search_artifacts: true

          # Treat the artifact name as a regular expression.
          name_is_regexp: true

          # Download every HTML report artifact.
          name: "^report-.*$"

          path: downloaded-reports




      # --------------------------------------------------
      # Verify downloaded artifacts
      # --------------------------------------------------
      #
      # Fail early if no reports were found.
      # This usually indicates that the triggering workflow
      # did not publish any report artifacts.
      # --------------------------------------------------

      - name: Verify downloaded artifacts
        shell: bash
        run: |

          echo "Downloaded artifacts"

          find downloaded-reports || true

          if [ ! -d downloaded-reports ]; then
            echo "No report artifacts found."
            exit 1
          fi

      # --------------------------------------------------
      # Build GitHub Pages website
      #
      # This is the heart of the deployment workflow.
      #
      # Responsibilities:
      #
      # 1. Copy the QA Portal.
      # 2. Discover every downloaded report artifact.
      # 3. Extract entity and suite names from the artifact.
      # 4. Rebuild the GitHub Pages directory structure.
      #
      # # Reports are discovered dynamically from the downloaded artifacts.
      #
      # Example:
      #
      # report-customers-smoke
      #           │
      #           ▼
      # site/customers/smoke
      #
      # report-orders-regression
      #           │
      #           ▼
      # site/orders/regression
      #
      # --------------------------------------------------

      - name: Build website
        shell: bash
        run: |

          mkdir -p site

          # --------------------------------------------------
          # Copy QA Portal
          #
          # The portal acts as the landing page for all
          # published Allure reports.
          #
          # Source:
          #   docs/portal/
          #
          # Destination:
          #   site/
          # --------------------------------------------------

          mkdir -p site

          cp docs/portal/index.html site/
          cp docs/portal/style.css site/

          echo
          echo "===== Downloaded artifacts ====="
          find downloaded-reports

          echo
          echo "===== Building website ====="

          for artifact in downloaded-reports/report-*; do

            [ -d "$artifact" ] || continue

            artifact_name=$(basename "$artifact")

            # Remove the standard artifact prefix.
            #
            # report-customers-smoke
            #        ↓
            # customers-smoke
            name="${artifact_name#report-}"

            # Extract the entity name.
            #
            # customers-smoke
            # └────────┘
            entity="${name%-*}"

            # Extract the test suite.
            #
            # customers-smoke
            #           └───┘
            suite="${name##*-}"

            echo "Publishing $entity / $suite"

            mkdir -p "site/$entity/$suite"

            cp -R "$artifact"/. "site/$entity/$suite"

          done

          echo
          echo "===== Final site ====="

          find site

          echo
          echo "===== Portal ====="
          ls -R site

          echo
          echo "===== Smoke ====="
          ls -R site/customers || true

          echo
          echo "===== HTML ====="
          find site -name index.html

      # --------------------------------------------------
      # Optional diagnostic output.
      #
      # Helps troubleshoot GitHub Pages publication when
      # investigating CI failures.
      # --------------------------------------------------

      - name: Debug generated website
        shell: bash
        run: |
          echo "=========================================="
          echo " GitHub Pages Website"
          echo "=========================================="

          pwd

          echo
          echo "Generated site:"
          find site | sort

          echo
          echo "Downloaded report artifacts:"
          find downloaded-reports | sort

      # --------------------------------------------------
      # Publish website
      # --------------------------------------------------

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          keep_files: false

      # --------------------------------------------------
      # Publish the rebuilt QA Portal to GitHub Pages.
      #
      # Existing reports remain available because the
      # deployment preserves the complete site structure.
      # --------------------------------------------------
