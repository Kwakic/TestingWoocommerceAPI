
name: Performance Tests ⏱️
# Controls:
# orchestration
# dependencies
# permissions
# triggers
# concurrency

# ==================================================
# 🔁 Triggers
# ==================================================
on:
#  schedule:
#    - cron: "0 4 * * 0"  # Sunday 4 AM

#  push:
#    branches: [ main ]

  # --------------------------------------------------
  # Allow manual execution from GitHub UI
  # --------------------------------------------------
  workflow_dispatch:


jobs:

  # ==================================================
  # 🧪 JOB 1 — EXECUTE SMOKE TESTS
  #
  # Matrix strategy:
  # One isolated job per entity/team.
  #
  # Enterprise rationale:
  # - independent ownership
  # - isolated failures
  # - parallel execution
  # - scalable architecture
  #
  # Delegates all shared CI logic to the reusable
  # enterprise test runner workflow.
  #
  # Shared responsibilities extracted:
  # - checkout
  # - python setup
  # - dependency install
  # - docker startup
  # - MySQL readiness
  # - WooCommerce bootstrap
  # - env configuration
  # - pytest execution
  # - artifact uploads
  # - docker cleanup
  # ==================================================
  test:

    # --------------------------------------------------
    # Matrix execution
    #
    # Each entity represents:
    # - ownership boundary
    # - deployment boundary
    # - reporting boundary
    #
    # IMPORTANT:
    # One entity failure must NOT cancel others.
    #
    # Example:
    # customers failure must NOT cancel:
    # - orders
    # - products
    # - coupons
    #
    # This preserves full diagnostic visibility.
    # --------------------------------------------------
    strategy:

      fail-fast: false

      matrix:
        entity:
          - customers
          - orders
          - products
          - coupons

    uses: ./.github/workflows/reusable-test-runner.yml

    with:

      # --------------------------------------------------
      # Test suite metadata
      # --------------------------------------------------
      suite_name: performance
      pytest_markers: performance

      # --------------------------------------------------
      # Pytest runtime configuration
      # --------------------------------------------------
      timeout_minutes: 45
      pytest_durations: 20

      # --------------------------------------------------
      # Entity ownership boundary
      #
      # Entity == Team == Microservice
      #
      # Examples:
      # - customers
      # - orders
      # - products
      # - coupons
      #
      # Passed to reusable-test-runner.yml
      # for:
      # - entity-specific test execution
      # - entity-specific reporting
      # - entity-specific artifacts
      # - ownership isolation
      # --------------------------------------------------
      entity: ${{ matrix.entity }}

  # ==================================================
  # 📊 JOB 2 — GENERATE + PUBLISH ALLURE REPORT
  # ==================================================
  publish-report:

    strategy:

      fail-fast: false

      matrix:
        entity:
          - customers
#          - orders
#          - products
#          - coupons

    concurrency:
      group: pages-deploy-${{ matrix.entity }}
      cancel-in-progress: false

    needs: test

    permissions:
      contents: write

    uses: ./.github/workflows/reusable-allure-report.yml

    with:
      suite_name: performance
      report_timeout_minutes: 10
      entity: ${{ matrix.entity }}
