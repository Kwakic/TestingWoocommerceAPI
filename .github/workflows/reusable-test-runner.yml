name: Reusable Test Runner

# ==================================================
# 🔁 Reusable workflow entrypoint
# ==================================================
on:
  workflow_call:

    # --------------------------------------------------
    # 🔧 Inputs configurable by caller workflows
    # --------------------------------------------------
    inputs:

      suite_name:
        required: true
        type: string

      pytest_markers:
        required: true
        type: string

      timeout_minutes:
        required: false
        type: number
        default: 20

      pytest_durations:
        required: false
        type: number
        default: 10

      pytest_maxfail:
        required: false
        type: string # If not optional we set output to: number
        default: ""  # optional

      pytest_extra_args:
        required: false
        type: string
        default: ""

      entity:
        required: false
        type: string
        default: ""

      setup_woocommerce:
        required: false
        type: boolean
        default: true

jobs:

  # ==================================================
  # 🧪 JOB — RUN TESTS + GENERATE ALLURE RESULTS
  # ==================================================
  test:

    runs-on: ubuntu-latest

    timeout-minutes: ${{ inputs.timeout_minutes }}

    steps:

      # --------------------------------------------------
      # 1. Checkout repository
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Setup Python project
      #
      # Shared composite action:
      # - setup-python
      # - pip caching
      # - editable install
      # - environment diagnostics
      # --------------------------------------------------
      - name: Setup Python project
        uses: ./.github/actions/setup-python-project

      # --------------------------------------------------
      # 3. Setup WooCommerce environment
      # Optional:
      #
      # Some suites require a full Dockerized
      # WooCommerce stack.
      #
      # Examples:
      #
      # - smoke
      # - integration
      # - regression
      # - performance
      #
      # Other suites intentionally remain
      # lightweight and execute without Docker.
      #
      # Examples:
      #
      # - preflight
      #
      # This preserves fast developer feedback
      # while keeping infrastructure-heavy suites
      # fully reproducible.

      # What it does:
      # - Docker startup
      # - MySQL readiness
      # - WooCommerce bootstrap
      # - API credential extraction
      # - DB environment configuration
      # --------------------------------------------------
      - name: Setup WooCommerce environment
        if: inputs.setup_woocommerce
        uses: ./.github/actions/setup-woocommerce

      # --------------------------------------------------
      # 4. Configure CI environment
      #
      # Shared composite action:
      # - runtime configuration
      # - logging behavior
      # - CI metadata
      # - environment flags
      # --------------------------------------------------
      - name: Configure CI environment
        uses: ./.github/actions/configure-ci-env

      # --------------------------------------------------
      # 5. Determine pytest collection target
      #
      # Enterprise rationale:
      #
      # Allows matrix jobs to execute only the tests
      # owned by the target entity/team.
      #
      # Examples:
      #
      # customers -> tests/customers
      # orders    -> tests/orders
      # products  -> tests/products
      # coupons   -> tests/coupons
      # shared   -> tests/shared
      #
      # Backward compatibility:
      #
      # Workflows that do not yet pass an entity
      # continue to execute the entire repository.
      # --------------------------------------------------
      - name: Determine test target
        shell: bash
        run: |

          if [ -n "${{ inputs.entity }}" ]; then

            TARGET="tests/${{ inputs.entity }}"

          else

            TARGET="tests"

          fi

          echo "TEST_TARGET=$TARGET" >> "$GITHUB_ENV"

          echo "Selected test target:"
          echo "$TARGET"

      # --------------------------------------------------
      # 6. Run pytest
      # Generates:
      # - Allure raw results
      # - JUnit XML
      # - structured logs
      #
      # Enterprise rationale:
      #
      # Pytest is the source of truth for test collection.
      #
      # We intentionally do NOT inspect the filesystem to determine whether tests exist.
      #
      # Reasons:
      #
      # - tests may be commented out
      # - tests may be deselected by markers
      # - tests may be skipped
      # - tests may be under development
      #
      # Pytest exit code semantics:
      #
      #   0 = tests executed successfully
      #   1 = test failures
      #   2+ = execution / infrastructure issues
      #   5 = no tests collected
      #
      # In a growing multi-entity framework, "no tests collected" is NOT considered a CI failure.
      #
      # Examples:
      #
      # - entity contains active tests
      # - entity tests are temporarily disabled
      # - marker filtering excludes all tests
      # - entity is under development
      #
      # In all cases, Exit Code 5 is treated as:
      #
      #   SUCCESS (Skipped Entity)
      #
      # This allows the matrix to represent ownership
      # boundaries even when a team has not yet
      # implemented or enabled its tests.
      #
      # This preserves:
      # - matrix stability
      # - ownership visibility
      # - incremental team adoption

      # Supported scenarios:
      #
      # - Active smoke tests                -> Run
      # - Tests temporarily disabled        -> Skip
      # - Marker filtering excludes tests   -> Skip
      # - Entity under development          -> Skip
      # - No tests yet                      -> Skip
      # - Test failures                     -> Fail
      # - Infrastructure failures           -> Fail
      # --------------------------------------------------
      - name: Run pytest
        shell: bash
        run: |

          # ----------------------------------------------
          # Allow pytest to return non-zero exit codes
          # so we can evaluate them explicitly.
          # ----------------------------------------------
          set +e

          python -m pytest "$TEST_TARGET" \
            -m "${{ inputs.pytest_markers }}" \
            -ra \
            ${{ inputs.pytest_extra_args }} \
            --durations=${{ inputs.pytest_durations }} \
            ${{ inputs.pytest_maxfail && format('--maxfail={0}', inputs.pytest_maxfail) || '' }} \
            --clean-alluredir \
            --junitxml=reports/junit/results.xml \
            --alluredir=reports/allure-results

          PYTEST_EXIT_CODE=$?

          # Restore strict mode
          set -e

          # ----------------------------------------------
          # Exit Code 5 = No tests collected
          #
          # Treat as successful skipped entity.
          # ----------------------------------------------
          if [ "$PYTEST_EXIT_CODE" -eq 5 ]; then

            echo "No eligible tests collected."
            echo "Entity: ${{ inputs.entity }}"
            echo "Result: SKIPPED"

            # ----------------------------------------------
            # Publish execution summary to GitHub Actions
            #
            # This provides visibility that the entity was
            # intentionally skipped rather than silently
            # succeeding.
            # ----------------------------------------------
            echo "## Entity Execution Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Entity: ${{ inputs.entity }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: SKIPPED" >> "$GITHUB_STEP_SUMMARY"
            echo "- Reason: No eligible tests collected" >> "$GITHUB_STEP_SUMMARY"

            exit 0

          fi

          if [ "$PYTEST_EXIT_CODE" -eq 0 ]; then

            echo "## Entity Execution Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Entity: ${{ inputs.entity }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: EXECUTED" >> "$GITHUB_STEP_SUMMARY"
            echo "- Result: SUCCESS" >> "$GITHUB_STEP_SUMMARY"

          fi

          exit "$PYTEST_EXIT_CODE"


      # --------------------------------------------------
      # 8. Upload Allure raw results
      # --------------------------------------------------
      # Entity-specific artifacts
      #
      # Ownership model:
      #
      # Entity == Team == Microservice
      #
      # Each matrix job publishes its own artifacts.
      #
      # Example:
      #
      # customers-smoke-allure-results
      # orders-smoke-allure-results
      # products-smoke-allure-results
      # coupons-smoke-allure-results
      #
      # This enables:
      #
      # - independent team ownership
      # - per-entity troubleshooting
      # - future deployment gates
      # - future notification routing
      # - future report isolation
      # --------------------------------------------------
      # --------------------------------------------------
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.entity }}-${{ inputs.suite_name }}-allure-results
          path: reports/allure-results
          if-no-files-found: ignore

      # --------------------------------------------------
      # 9. Upload structured logs
      # --------------------------------------------------
      - name: Upload structured logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.entity }}-${{ inputs.suite_name }}-structured-logs
          path: reports/logs
          if-no-files-found: ignore

      # --------------------------------------------------
      # 10. Upload JUnit XML results
      # --------------------------------------------------
      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.entity }}-${{ inputs.suite_name }}-junit-results
          path: reports/junit/results.xml
          if-no-files-found: warn

      # --------------------------------------------------
      # 11. Cleanup Docker environment
      #
      # Shared composite action:
      # - stop containers
      # - remove networks
      # - remove anonymous volumes
      # --------------------------------------------------
      - name: Cleanup Docker environment
        if: always() && inputs.setup_woocommerce
        uses: ./.github/actions/docker-cleanup
