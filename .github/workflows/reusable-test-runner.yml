name: Reusable Test Runner

# ==================================================
# 🔁 Reusable workflow entrypoint
# ==================================================
on:
  workflow_call:

    # --------------------------------------------------
    # 🔧 Inputs configurable by caller workflows
    # --------------------------------------------------
    inputs:

      suite_name:
        required: true
        type: string

      pytest_markers:
        required: true
        type: string

      timeout_minutes:
        required: false
        type: number
        default: 20

      pytest_durations:
        required: false
        type: number
        default: 10

      pytest_maxfail:
        required: false
        type: number
        default: 3


jobs:

  # ==================================================
  # 🧪 JOB — RUN TESTS + GENERATE ALLURE RESULTS
  # ==================================================
  test:

    runs-on: ubuntu-latest

    timeout-minutes: ${{ inputs.timeout_minutes }}

    steps:

      # --------------------------------------------------
      # 1. Checkout repository
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Setup Python
      # --------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      # --------------------------------------------------
      # 3. Install project dependencies
      # --------------------------------------------------
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e "./EcommerceAPI[dev]"

      # --------------------------------------------------
      # 4. Start Docker environment
      # --------------------------------------------------
      - name: Start Docker stack
        run: |
          docker compose -f docker-compose.wp.yml up -d

      # --------------------------------------------------
      # 🔥 Wait for MySQL
      # Prevents race conditions during bootstrap
      # --------------------------------------------------
      - name: Wait for MySQL
        run: |
          until nc -z 127.0.0.1 3306; do
            echo "Waiting for MySQL..."
            sleep 3
          done

      # --------------------------------------------------
      # 5. Bootstrap WooCommerce
      # Capture dynamic API credentials
      # --------------------------------------------------
      - name: Bootstrap WooCommerce and capture credentials
        run: |
          set -e

          OUTPUT=$(bash scripts/setup.sh)

          echo "$OUTPUT"

          WC_KEY=$(echo "$OUTPUT" | grep "CONSUMER KEY" | awk '{print $3}')
          WC_SECRET=$(echo "$OUTPUT" | grep "CONSUMER SECRET" | awk '{print $3}')

          echo "WC_KEY=$WC_KEY" >> $GITHUB_ENV
          echo "WC_SECRET=$WC_SECRET" >> $GITHUB_ENV

      # --------------------------------------------------
      # 6. Configure DB connection
      # Must match docker-compose values
      # --------------------------------------------------
      - name: Configure DB connection
        run: |
          echo "DB_USER=wp" >> $GITHUB_ENV
          echo "DB_PASSWORD=wp" >> $GITHUB_ENV
          echo "DB_HOST=127.0.0.1" >> $GITHUB_ENV
          echo "DB_PORT=3306" >> $GITHUB_ENV
          echo "DB_DATABASE=wordpress" >> $GITHUB_ENV
          echo "DB_TABLE_PREFIX=wp_" >> $GITHUB_ENV

      # --------------------------------------------------
      # 7. CI environment overrides
      # Centralized runtime configuration
      # --------------------------------------------------
      - name: Configure environment (CI overrides)
        run: |
          echo "AUTO_ALLURE_REPORT=false" >> $GITHUB_ENV
          echo "ENABLE_STRUCTURED_LOGS=true" >> $GITHUB_ENV
          echo "STRICT_ENTITY_DISCOVERY=true" >> $GITHUB_ENV
          echo "REQUIRE_ENV=true" >> $GITHUB_ENV
          echo "SESSION_ID=${{ github.run_id }}" >> $GITHUB_ENV
          echo "API_ENV=ci" >> $GITHUB_ENV
          echo "PERF_ITERATIONS=5" >> $GITHUB_ENV

      # --------------------------------------------------
      # 8. Run pytest
      # Generates:
      # - Allure raw results
      # - JUnit XML
      # - structured logs
      # --------------------------------------------------
      - name: Run pytest
        run: |
          pytest \
            -m "${{ inputs.pytest_markers }}" \
            -ra \
            --durations=${{ inputs.pytest_durations }} \
            --maxfail=${{ inputs.pytest_maxfail }} \
            --clean-alluredir \
            --junitxml=reports/junit/results.xml \
            --alluredir=reports/allure-results

      # --------------------------------------------------
      # 9. Upload Allure raw results
      # --------------------------------------------------
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.suite_name }}-allure-results
          path: reports/allure-results
          if-no-files-found: warn

      # --------------------------------------------------
      # 10. Upload structured logs
      # --------------------------------------------------
      - name: Upload structured logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.suite_name }}-structured-logs
          path: reports/logs
          if-no-files-found: warn

      # --------------------------------------------------
      # 11. Upload JUnit XML results
      # --------------------------------------------------
      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.suite_name }}-junit-results
          path: reports/junit/results.xml
          if-no-files-found: warn

      # --------------------------------------------------
      # 12. Stop Docker stack
      # Always cleanup runner resources
      # --------------------------------------------------
      - name: Stop Docker stack
        if: always()
        run: |
          docker compose -f docker-compose.wp.yml down
