name: Reusable Test Runner

# ==================================================
# 🔁 Reusable workflow entrypoint
# ==================================================
on:
  workflow_call:

    # --------------------------------------------------
    # 🔧 Inputs configurable by caller workflows
    # --------------------------------------------------
    inputs:

      suite_name:
        required: true
        type: string

      pytest_markers:
        required: true
        type: string

      timeout_minutes:
        required: false
        type: number
        default: 20

      pytest_durations:
        required: false
        type: number
        default: 10

      pytest_maxfail:
        required: false
        type: string # If not optional we set output to: number
        default: ""  # optional

      pytest_extra_args:
        required: false
        type: string
        default: ""

      entity:
        required: false
        type: string
        default: ""

jobs:

  # ==================================================
  # 🧪 JOB — RUN TESTS + GENERATE ALLURE RESULTS
  # ==================================================
  test:

    runs-on: ubuntu-latest

    timeout-minutes: ${{ inputs.timeout_minutes }}

    steps:

      # --------------------------------------------------
      # 1. Checkout repository
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Setup Python project
      #
      # Shared composite action:
      # - setup-python
      # - pip caching
      # - editable install
      # - environment diagnostics
      # --------------------------------------------------
      - name: Setup Python project
        uses: ./.github/actions/setup-python-project

      # --------------------------------------------------
      # 3. Setup WooCommerce environment
      #
      # Shared composite action:
      # - Docker startup
      # - MySQL readiness
      # - WooCommerce bootstrap
      # - API credential extraction
      # - DB environment configuration
      # --------------------------------------------------
      - name: Setup WooCommerce environment
        uses: ./.github/actions/setup-woocommerce

      # --------------------------------------------------
      # 4. Configure CI environment
      #
      # Shared composite action:
      # - runtime configuration
      # - logging behavior
      # - CI metadata
      # - environment flags
      # --------------------------------------------------
      - name: Configure CI environment
        uses: ./.github/actions/configure-ci-env

      # --------------------------------------------------
      # 5. Determine pytest collection target
      #
      # Enterprise rationale:
      #
      # Allows matrix jobs to execute only the tests
      # owned by the target entity/team.
      #
      # Examples:
      #
      # customers -> tests/customers
      # orders    -> tests/orders
      # products  -> tests/products
      # coupons   -> tests/coupons
      # shared   -> tests/shared
      #
      # Backward compatibility:
      #
      # Workflows that do not yet pass an entity
      # continue to execute the entire repository.
      # --------------------------------------------------
      - name: Determine test target
        shell: bash
        run: |

          if [ -n "${{ inputs.entity }}" ]; then

            TARGET="tests/${{ inputs.entity }}"

          else

            TARGET="tests"

          fi

          echo "TEST_TARGET=$TARGET" >> "$GITHUB_ENV"

          echo "Selected test target:"
          echo "$TARGET"

      # --------------------------------------------------
      # 6. Run pytest
      # Generates:
      # - Allure raw results
      # - JUnit XML
      # - structured logs
      #
      # Enterprise rationale:
      #
      # Pytest is the source of truth for test collection.
      #
      # We intentionally do NOT inspect the filesystem
      # to determine whether tests exist.
      #
      # Reasons:
      #
      # - tests may be commented out
      # - tests may be deselected by markers
      # - tests may be skipped
      # - tests may be under development
      #
      # Pytest exit code semantics:
      #
      #   0 = tests executed successfully
      #   1 = test failures
      #   2+ = execution / infrastructure issues
      #   5 = no tests collected
      #
      # In a growing multi-entity framework,
      # "no tests collected" is NOT considered
      # a CI failure.
      #
      # Example:
      #
      # customers -> active smoke tests
      # orders    -> entity scaffold only
      # products  -> tests under development
      # coupons   -> tests temporarily disabled
      #
      # Exit code 5 is therefore treated as:
      #
      #   SUCCESS (Skipped Entity)
      #
      # This preserves:
      # - matrix stability
      # - ownership visibility
      # - incremental team adoption

      # Supports all scenarios automatically:
      # Scenario	                            Result
      # Active smoke tests	                    Run
      # Folder exists but tests commented out	Skip
      # Folder exists but marker mismatch	    Skip
      # Tests under development	                Skip
      # No tests yet	                        Skip
      # Test failure	                        Fail
      # Infrastructure failure	                Fail
      # --------------------------------------------------
      - name: Run pytest
        shell: bash
        run: |

          python -m pytest "$TEST_TARGET" \
            -m "${{ inputs.pytest_markers }}" \
            -ra \
            ${{ inputs.pytest_extra_args }} \
            --durations=${{ inputs.pytest_durations }} \
            ${{ inputs.pytest_maxfail && format('--maxfail={0}', inputs.pytest_maxfail) || '' }} \
            --clean-alluredir \
            --junitxml=reports/junit/results.xml \
            --alluredir=reports/allure-results

          PYTEST_EXIT_CODE=$?

          # ----------------------------------------------
          # Exit Code 5 = No tests collected
          #
          # Treat as a successful skipped entity.
          # ----------------------------------------------
          if [ "$PYTEST_EXIT_CODE" -eq 5 ]; then

            echo "No eligible tests collected."
            echo "Entity: ${{ inputs.entity }}"
            echo "Result: SKIPPED"

            exit 0

          fi

          exit "$PYTEST_EXIT_CODE"


      # --------------------------------------------------
      # 8. Upload Allure raw results
      # --------------------------------------------------
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.suite_name }}-allure-results
          path: reports/allure-results
          if-no-files-found: warn

      # --------------------------------------------------
      # 9. Upload structured logs
      # --------------------------------------------------
      - name: Upload structured logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.suite_name }}-structured-logs
          path: reports/logs
          if-no-files-found: warn

      # --------------------------------------------------
      # 10. Upload JUnit XML results
      # --------------------------------------------------
      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.suite_name }}-junit-results
          path: reports/junit/results.xml
          if-no-files-found: warn

      # --------------------------------------------------
      # 11. Cleanup Docker environment
      #
      # Shared composite action:
      # - stop containers
      # - remove networks
      # - remove anonymous volumes
      # --------------------------------------------------
      - name: Cleanup Docker environment
        if: always()
        uses: ./.github/actions/docker-cleanup
