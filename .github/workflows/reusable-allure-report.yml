
name: Reusable Allure Report
# Controls: CI execution logic ONLY

# ==================================================
# 🔁 Reusable workflow entrypoint
# ==================================================
on:
  workflow_call:

    # --------------------------------------------------
    # 🔧 Inputs configurable by caller workflows
    # --------------------------------------------------
    inputs:

      suite_name:
        required: true
        type: string

      report_timeout_minutes:
        required: false
        type: number
        default: 10

      entity:
        required: true
        type: string


jobs:

  # ==================================================
  # 📊 JOB — GENERATE + PUBLISH ALLURE REPORT
  # ==================================================
  report:

    # --------------------------------------------------
    # Always run even if previous jobs failed
    # --------------------------------------------------
    if: always()

    runs-on: ubuntu-latest

    timeout-minutes: ${{ inputs.report_timeout_minutes }}

    # --------------------------------------------------
    # Required for GitHub Pages deployment
    # --------------------------------------------------
    permissions:
      contents: write

    steps:

      # --------------------------------------------------
      # 1. Checkout repository
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Download Allure raw results
      # --------------------------------------------------
      # Entity-specific artifact download
      # Example:
      # customers-smoke-allure-results
      # --------------------------------------------------
      - name: Download Allure results
        id: download_allure
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.entity }}-${{ inputs.suite_name }}-allure-results
          path: reports/allure-results

      # --------------------------------------------------
      # 2a.Detect whether Allure results exist
      #
      # Some entities may not yet contain active tests.
      #
      # Example:
      # - customers -> report generated
      # - orders    -> skipped
      # - products  -> skipped
      # - coupons   -> skipped
      #
      # Missing Allure results are NOT considered
      # a CI failure.
      # --------------------------------------------------
      - name: Check Allure results
        id: allure_check
        shell: bash
        run: |

          if [ ! -d "reports/allure-results" ] || [ -z "$(ls -A reports/allure-results 2>/dev/null)" ]; then

            echo "HAS_ALLURE_RESULTS=false" >> "$GITHUB_ENV"

            echo "## Report Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Entity: ${{ inputs.entity }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: SKIPPED" >> "$GITHUB_STEP_SUMMARY"
            echo "- Reason: No Allure results artifact found" >> "$GITHUB_STEP_SUMMARY"

          else

            echo "HAS_ALLURE_RESULTS=true" >> "$GITHUB_ENV"

          fi

      # --------------------------------------------------
      # 3. Checkout gh-pages branch
      #
      # Used for Allure history/trend preservation
      # --------------------------------------------------
      - name: Checkout gh-pages branch
        if: env.HAS_ALLURE_RESULTS == 'true'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      # --------------------------------------------------
      # 4. Restore Allure history
      #
      # Enables historical trend charts
      # across CI runs.
      # --------------------------------------------------
      - name: Restore Allure history
        if: env.HAS_ALLURE_RESULTS == 'true'
        run: |
          mkdir -p reports/allure-results/history

          if [ -d "gh-pages/${{ inputs.entity }}/${{ inputs.suite_name }}/history" ]; then
            cp -r gh-pages/${{ inputs.entity }}/${{ inputs.suite_name }}/history/* \
                  reports/allure-results/history/
            echo "✅ Allure history restored"
          else
            echo "ℹ️ No previous Allure history found"
          fi

      # --------------------------------------------------
      # 5. Setup Java
      #
      # Required for Allure CLI
      # --------------------------------------------------
      - name: Setup Java
        if: env.HAS_ALLURE_RESULTS == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # --------------------------------------------------
      # 6. Install Allure CLI
      # --------------------------------------------------
      - name: Install Allure
        if: env.HAS_ALLURE_RESULTS == 'true'
        run: |
          curl -L -o allure.zip https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip

          unzip -q allure.zip

          echo "$PWD/allure-2.29.0/bin" >> $GITHUB_PATH

      # --------------------------------------------------
      # 7. Generate Allure HTML report
      # --------------------------------------------------
      - name: Generate Allure report
        if: env.HAS_ALLURE_RESULTS == 'true'
        run: |
          allure generate reports/allure-results \
            -o reports/allure-report/${{ inputs.entity }}/${{ inputs.suite_name }} \
            --clean

      # --------------------------------------------------
      # 8. Upload generated HTML report
      # --------------------------------------------------
      - name: Upload HTML Report Artifact
        if: env.HAS_ALLURE_RESULTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.entity }}-${{ inputs.suite_name }}-allure-report
          path: reports/allure-report
          if-no-files-found: warn

      # --------------------------------------------------
      # DEBUG PURPOSE ONLY
      # --------------------------------------------------
      - name: Debug published files
        if: env.HAS_ALLURE_RESULTS == 'true'
        run: |
          echo "===== Publishing ====="
          pwd
          ls -la reports/allure-report
          echo
          echo "===== customers ====="
          ls -la reports/allure-report/${{ inputs.entity }}
          echo
          echo "===== suite ====="
          ls -la reports/allure-report/${{ inputs.entity }}/${{ inputs.suite_name }}
          echo
          find reports/allure-report/${{ inputs.entity }}/${{ inputs.suite_name }} -maxdepth 2

      # --------------------------------------------------
      # 9. Deploy report to GitHub Pages
      # --------------------------------------------------
      - name: Deploy to GitHub Pages
        if: env.HAS_ALLURE_RESULTS == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/allure-report/${{ inputs.entity }}/${{ inputs.suite_name }}
          publish_branch: gh-pages
          keep_files: true

      # --------------------------------------------------
      # 10. Print clickable Allure URL
      # --------------------------------------------------
      - name: Print Allure URL
        if: env.HAS_ALLURE_RESULTS == 'true'
        run: |
          echo "====================================="
          echo "Allure Report:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ inputs.entity }}/${{ inputs.suite_name }}/"
          echo "====================================="
