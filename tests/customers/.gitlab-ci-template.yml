# Customers Team - Local CI Template (Optional)
# -------------------------------------------------
# This template is used ONLY if customers team wants to run its suite independently (e.g. in a feature branch).
# The main pipeline at repo root orchestrates all teams.

stages:
  - customers_preflight
  - customers_tests

variables:
  PYTHON_VERSION: "3.11"
  LOG_DIR: "$CI_PROJECT_DIR/reports/customers/logs"
  AUTO_HTML_REPORT: "true"
  FAIL_ON_EMPTY_LIST: "true"

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install -e .[test]

customers_preflight:
  stage: customers_preflight
  image: python:3.11
  script:
    - pytest tests/customers -m "preflight" -s --disable-warnings --log-cli-level=INFO
  allow_failure: false

customers_full_suite:
  stage: customers_tests
  image: python:3.11
  script:
    - pytest tests/customers -s --disable-warnings \
        --junitxml=reports/customers/test_results.xml \
        --auto-html-report \
        --log-cli-level=INFO
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - reports/customers/**
