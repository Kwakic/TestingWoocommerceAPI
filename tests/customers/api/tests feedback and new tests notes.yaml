#=================================================================================
#CREATING OR UPDATING CUSTOMERS
#Note:
#     - Positive tests → using CustomersHelper + create_customer_for_test() fixture.
#     - Negative tests → going low-level directly to requests_utility.post(...). E.g., for negative tests:
#     test_update_customer.py (@pytest.mark.tcid21) or test_create_customer.py (@pytest.mark.tcid15)
#=================================================================================
#When create_customer() calls:
#rs_created = self.requests_utility.post('customers', payload=payload, expected_status_code=expected_status_code)
#
#This is what happens step by step:
#   1. post() method is called.
#   2. It delegates to _request(), which:
#       - Constructs the full URL.
#       - Records the start time.
#       - Calls _request_with_backoff(), which:
#            - Makes the actual request (with retry/backoff logic for 500s, 429, etc.).
#            - Returns the raw response object from requests library.
#    3. _request() then calls _handle_response(), passing:
#        - The raw response
#        - The expected_status_code
#    4. _handle_response():
#        - Saves the actual status code and response JSON.
#        - Compares actual vs. expected status code.
#        - If they don't match, it raises an UnexpectedStatusCodeError, stopping execution unless caught.
#        - If they do match, it returns the parsed JSON body (or text).
#
#
#🧭 Call Chain Breakdown
#1. ✅ Your test or fixture calls create_customer_for_test()
#That fixture returns a function (_create_customer(...)) that eventually calls:
#customer = customer_helper.create_customer(**kwargs)
#
#2. ✅ customer_helper.create_customer() is called
#This is from your CustomersHelper class:
#return self.requests_utility.post('customers', payload=payload, expected_status_code=expected_status_code)
#Here you're calling the post() method from RequestUtility. So the HTTP method is implicitly POST at this point.
#
#3. ✅ Inside RequestUtility.post()
#def post(self, endpoint, payload=None, headers=None, expected_status_code=201, schema=None):
#    return self._request("post", endpoint, expected_status_code, payload=payload, headers=headers, schema=schema)
#This line: self._request("post", ...) Defines the HTTP method explicitly as "post" and passes it down to _request().
#
#4. ✅ In _request()
#response = self._request_with_backoff(
#    method=method,   # <--- this is "post"
#    ...
#)
#
#5. ✅ In _request_with_backoff()
#response = self.session.request(method=method, auth=self.auth, **kwargs)
#Finally, this line sends the actual HTTP request using the requests library, where method="post" is passed directly
#to requests. So yes — method is defined way up in the call stack (as "post" in the post() method), and it flows
#through all the internal methods until it reaches requests.Session.request(...).
#
