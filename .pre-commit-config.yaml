# .pre-commit-config.yaml

# 🧠 What happens now
#On every commit:
#1. Fix trailing whitespace automatically ✅
#2. Fix EOF newline automatically ✅
#3. Format code with black ✅
#4. Run flake8 ✅
#5. Run smoke tests ✅
#6. Block commit if anything fails ❌


repos:
  # 🔹 Basic formatting & whitespace (fix your current warnings)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  # 🔹 Python formatting (Black = automatic code formatter)
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  # 🔹 Linting (optional but recommended. Flake8 = code quality checker (linter))
  # What it checks:
  # - unused imports
  # - undefined variables
  # - bad practices
  # - style violations
  # - default is [--max-line-length=88]
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=88
          - --extend-ignore=E203,W503,E501  # E501 is the line length check

  # 🔹 Your TEST gate (important for QA)
  - repo: local
    hooks:
      - id: pytest-preflight
        name: pytest preflight tests
        entry: pytest -m preflight -q
        language: system
        pass_filenames: false
