stages:
  - test

customers_test:
  stage: test
  image: python:3.11
  environment:
    name: test
  variables:
    TEAM: customers     # derived from folder name
    ENV: test           # derived from TARGET_ENVS
  script:
    - pip install -e '.[dev]'
    - mkdir -p reports/test/customers/allure-results
    - pytest tests/customers \
        --alluredir=reports/test/customers/allure-results \
        --junitxml=reports/test/customers/results.xml
  artifacts:
    when: always
    paths:
      - reports/test/customers/

