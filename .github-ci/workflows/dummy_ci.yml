# GitHub CI — Matrix Microservice Tests (Allure)
# ------------------------------------------------------------
# - Discovers subfolders under tests/ and runs one job per service (parallel).
# - If SERVICE env var is set for the workflow or repository, discovery emits only that service,
#   allowing quick single-service runs.
# - Each job: install deps, run pytest with --alluredir, install Allure CLI, generate HTML if results exist.


name: CI - Matrix Microservice Tests (Allure)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  # Python version used everywhere
  PYTHON_VERSION: "3.11"

  # -------------------------
  # Structured Logging (JSONL)
  # -------------------------
  ENABLE_STRUCTURED_LOGS: "true"          # Emit JSON logs
  ENABLE_JSON_PRETTY: "false"             # Pretty-print disabled in CI to save space
  KEEP_STRUCTURED_LOGS: "3"               # Retain last N log folders
  LOG_DIR: "${{ github.workspace }}/EcommerceAPI/tests/api/logs"

  # Security toggles for logs
  REDACT_SENSITIVE_FIELDS: "true"
  LOG_PAYLOADS: "false"

  # Allure Reporting
  AUTO_ALLURE_REPORT: "true"

  # Performance settings
  PERF_ITERATIONS: "5"

  # Schema smoke tests strict mode
  FAIL_ON_EMPTY_LIST: "false"

  # API entity discovery during a pytest collection
  STRICT_ENTITY_DISCOVERY: "true"

jobs:
  discover-services:
    name: Discover Microservices
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.setmatrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - id: setmatrix
        run: |
          echo "🔍 Discovering microservice directories under tests/..."

          # If SERVICE env provided, run only that service.
          if [ -n "${{ env.SERVICE }}" ]; then
            services="${{ env.SERVICE }}"
            echo "SERVICE env set; running single service: $services"
            # single service -> output JSON array with quoted name
            echo "services=[\"$services\"]" >> $GITHUB_OUTPUT
          else
            # Build a comma-separated list of quoted service names: "customers","orders"
            services=$(find tests -maxdepth 1 -mindepth 1 -type d -printf '"%f",' | sed 's/,$//')
            echo "Discovered services: $services"
            # Emit a JSON array string acceptable to fromJson(...)
            echo "services=[$services]" >> $GITHUB_OUTPUT
          fi

  test-matrix:
    name: Test → ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: discover-services
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover-services.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .[test]

      - name: 🔐 Load Secrets for ${{ matrix.service }}
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: echo "Secrets loaded."

      - name: 🧪 Run Tests → ${{ matrix.service }} (Allure results)
        run: |
          RESULTS=reports/${{ matrix.service }}/allure-results
          mkdir -p "$RESULTS"
          pytest tests/${{ matrix.service }} \
            -s --disable-warnings --maxfail=3 \
            --alluredir="$RESULTS" \
            --junitxml=reports/${{ matrix.service }}/test-results.xml \
            --log-cli-level=INFO

      - name: 📊 Install Allure CLI (if generating HTML)
        if: env.AUTO_ALLURE_REPORT == 'true'
        run: |
          ALLURE_VER="2.27.0"
          curl -fsSL "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VER}/allure-${ALLURE_VER}.tgz" | tar -xz
          sudo mv "allure-${ALLURE_VER}" /opt/allure-${ALLURE_VER}
          sudo ln -sf /opt/allure-${ALLURE_VER}/bin/allure /usr/bin/allure
          allure --version

      - name: 🧾 Generate Allure HTML report
        if: env.AUTO_ALLURE_REPORT == 'true'
        run: |
          set -e
          RESULTS=reports/${{ matrix.service }}/allure-results
          REPORT=reports/${{ matrix.service }}/allure-report
          if [ -d "$RESULTS" ] && [ "$(ls -A $RESULTS)" ]; then
            allure generate "$RESULTS" -o "$REPORT" --clean
            echo "Allure report generated: $REPORT"
          else
            echo "No Allure results found for ${{ matrix.service }}; skipping HTML generation."
          fi

      - name: 📤 Upload Artifacts (Always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.service }}
          path: |
            ${{ env.LOG_DIR }}/**/*.jsonl
            reports/${{ matrix.service }}/test-results.xml
            reports/${{ matrix.service }}/allure-report/**
