name: CI — Docker + Pytest + Allure

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # --------------------------------------------------
      # 1. Checkout repo
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Setup Python
      # --------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # --------------------------------------------------
      # 3. Install dependencies
      # --------------------------------------------------
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # --------------------------------------------------
      # 4. Run full environment (Docker + tests)
      # --------------------------------------------------
      - name: Run framework (Docker + setup + pytest)
        run: |
          make run

      # --------------------------------------------------
      # 5. Install Java (required for Allure)
      # --------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # --------------------------------------------------
      # 6. Install Allure CLI
      # --------------------------------------------------
      - name: Install Allure
        run: |
          curl -L -o allure.zip https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip
          unzip -q allure.zip
          echo "$PWD/allure-2.29.0/bin" >> $GITHUB_PATH
          allure --version

      # --------------------------------------------------
      # 7. Generate Allure report
      # --------------------------------------------------
      - name: Generate Allure report
        run: |
          allure generate reports/allure-results -o reports/allure-report --clean

      # --------------------------------------------------
      # 8. Upload artifact (downloadable report)
      # --------------------------------------------------
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report

      # --------------------------------------------------
      # 9. Deploy to GitHub Pages
      # --------------------------------------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: reports/allure-report
          publish_branch: gh-pages
