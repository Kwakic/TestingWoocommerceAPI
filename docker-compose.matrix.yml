#version: "3.9"

# Reusable template for test containers
x-test-template: &test-template
  build:
    context: .
    dockerfile: Dockerfile
  image: ecommerceapi-tests:latest
  environment:
    ENV: docker
    ENABLE_STRUCTURED_LOGS: "true"
    AUTO_ALLURE_REPORT: "true"
    LOG_DIR: "/app/reports/logs"
    ENABLE_JSON_PRETTY: "false"
    KEEP_STRUCTURED_LOGS: "3"
    # Pass secrets to container
    WC_KEY: "${WC_KEY}"
    WC_SECRET: "${WC_SECRET}"
  volumes:
    - ./tests:/app/tests:ro
    - ./reports:/app/reports
  networks:
    - wc-net
  # ❌ REMOVE depends_on — WordPress is in different compose file
  # depends_on:
  #   - wordpress
  # ❌ REMOVE THIS LINE — it prevents build without profile
  # profiles: ["dont-run"]

services:
  customers:
    <<: *test-template
    profiles: ["customers"]
    command:
      - pytest
      - tests/customers
      - -s
      - --disable-warnings
      - --maxfail=3
      - --alluredir=reports/customers/allure-results

#  orders:
#    <<: *test-template
#    profiles: ["orders"]
#    command:
#      - tests/orders
#      - -s
#      - --disable-warnings
#      - --maxfail=3
#      - --alluredir=reports/orders/allure-results

# ✅ Use external network created by docker-compose.wp.yml
# ✅ Use external network created by docker-compose.wp.yml
networks:
  wc-net:
    name: testecommerceapi_wc-net
    external: true