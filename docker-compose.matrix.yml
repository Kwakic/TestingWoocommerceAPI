#version: "3.9"

# Reusable template for test containers
x-test-template: &test-template
  build:
    context: .
    dockerfile: Dockerfile
  image: ecommerceapi-tests:latest
  env_file:
    - .env          # ← ADD THIS LINE
  environment:
#    SERVICE: customers
    ENV: ${ENV:-docker}  # ✅ Defaults to "docker", can override with ENV=dev
    ENABLE_STRUCTURED_LOGS: "true"
    AUTO_ALLURE_REPORT: "true"
    LOG_DIR: "/app/reports/logs"
    ENABLE_JSON_PRETTY: "false"
    KEEP_STRUCTURED_LOGS: "3"
    # Pass secrets to container
    WC_KEY: "${WC_KEY}"
    WC_SECRET: "${WC_SECRET}"
  volumes:
    - ./tests:/app/tests:ro
    - ./reports:/app/reports
  # ❌ Remove networks section for local dev
  networks:
    - wc-net
  # ❌ REMOVE depends_on — WordPress is in different compose file
  # depends_on:
  #   - wordpress
  # ❌ REMOVE THIS LINE — it prevents build without profile
  # profiles: ["dont-run"]
    #- customers


services:
  customers:
    <<: *test-template
    profiles: ["customers"]
    environment:
      ENV: docker
      # ... existing vars ...

      # Add database credentials
      DB_HOST: db                    # ← Service name from docker-compose.wp.yml
      DB_PORT: "3306"
      DB_USER: wp
      DB_PASSWORD: wp
      DB_DATABASE: wordpress
    command:
      - pytest
      - tests/customers
#      - --ignore=tests/shared   # ← ADD THIS LINE
      - -s
      - --disable-warnings
      - --maxfail=3
      - --alluredir=reports/customers/allure-results

#  orders:
#    <<: *test-template
#    profiles: ["orders"]
#    command:
#      - tests/orders
#      - -s
#      - --disable-warnings
#      - --maxfail=3
#      - --alluredir=reports/orders/allure-results

# ✅ Use external network created by docker-compose.wp.yml
# ❌ Remove or comment out the networks section if you want to run locally only
networks:
  wc-net:
    name: testecommerceapi_wc-net
    external: true  # Keep this for GitLab CI