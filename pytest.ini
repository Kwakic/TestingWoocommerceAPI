[pytest]
# =================================================================================================
# 🧠 GLOBAL PYTEST CONFIGURATION
# -------------------------------------------------------------------------------------------------
# Centralized configuration for the SSQA API Test Suite.
# Defines:
#   - Pytest version and discovery behavior
#   - Default options (addopts)
#   - Path settings and import handling
#   - Marker documentation
#   - Logging output style
# =================================================================================================

# -------------------------------------------------------------------------------------------------
# ✅ CORE SETTINGS
# -------------------------------------------------------------------------------------------------
# Require at least pytest 8.0 for modern hook and marker support
minversion = 8.0

# Directories where pytest should look for tests
testpaths = tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# -------------------------------------------------------------------------------------------------
# ⚙️ DEFAULT BEHAVIOR (addopts)
# -------------------------------------------------------------------------------------------------
# Combined all previous addopts settings here to avoid duplication.
#
# Flags:
#   -ra   → Show summary of skipped, failed, or xfailed tests.
#   -q    → Run quietly (less verbose header).
#   --maxfail=1 → Stop early after first failure (can override locally).
#   --disable-warnings → Prevent clutter from warnings.
#   --tb=short → Short traceback format for cleaner CI logs.
#
# Note: Uncomment or override --junitxml in CI if you want per-job output files.
addopts = -ra -q --maxfail=1 --disable-warnings --tb=short

# -------------------------------------------------------------------------------------------------
# ⚠️ WARNING MANAGEMENT
# -------------------------------------------------------------------------------------------------
# Ignore warnings for custom test markers (to avoid “unknown mark” noise)
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning

# -------------------------------------------------------------------------------------------------
# 🪵 LOGGING CONFIGURATION
# -------------------------------------------------------------------------------------------------
# Enable live logging to console for both local and CI runs
log_cli = true
log_cli_level = DEBUG

# Compact but informative log format (time, level, nodeid, correlation_id if available)
log_cli_format = [%(asctime)s] [%(levelname)-8s] [🧪 %(nodeid)s] [🔗 %(correlation_id)s] %(message)s
log_cli_date_format = %H:%M:%S
log_auto_indent = true

# -------------------------------------------------------------------------------------------------
# 🧩 MARKER DOCUMENTATION
# -------------------------------------------------------------------------------------------------
# Define all valid pytest markers used across the suite.
# Helps both documentation and avoids “unknown marker” warnings.
markers =
    preflight: Environment, DB, and API readiness checks (run first in CI).
    schema: Schema validation for API responses.
    api: Full API coverage (CRUD, filters, edge cases).
    smoke: Minimal subset for quick verification.
    regression: Full regression suite (runs after preflight).
    integration: Multi-service or DB integration tests.
    performance: Optional stress/load checks (not default).
    skip_auth: Skip authentication-dependent tests.
    skip_rate_limit: Skip tests affected by API rate limiting.

# -------------------------------------------------------------------------------------------------
# 🧰 OPTIONAL BEHAVIOR / REPORTING
# -------------------------------------------------------------------------------------------------
# Uncomment to produce JUnit XML results by default (CI often enables this explicitly)
# junitxml = reports/junit.xml

# -------------------------------------------------------------------------------------------------
# 🧭 DOCUMENTATION NOTE
# -------------------------------------------------------------------------------------------------
# In CI (GitHub Actions):
#   - The preflight job runs first via `pytest -m preflight`
#   - The full test suite runs only if preflight passes
# Locally:
#   - Developers can run: pytest -m preflight -s -q -r s
#   - Or run the full suite: pytest -m api -s
# -------------------------------------------------------------------------------------------------