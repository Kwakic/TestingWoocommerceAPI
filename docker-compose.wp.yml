services:
  db:
    image: mysql:8.0
    container_name: wc-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
    networks:
      - wc-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5

  wordpress:
    image: wordpress:cli-php8.2  # ✅ CLI variant for wp commands
    container_name: wc-wp
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
    networks:
      - wc-net

networks:
  wc-net:
    name: testecommerceapi_wc-net