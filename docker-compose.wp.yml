services:
  db:
    image: mysql:8.0
    container_name: wc-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wc-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5

  wordpress:
    image: wordpress:cli-php8.2  # ✅ Use CLI variant with WP-CLI
    container_name: wc-wp
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
    ports:
      - "8888:80"
    networks:
      - wc-net

volumes:
  db_data:
  wp_data:

networks:
  wc-net:
    name: testecommerceapi_wc-net