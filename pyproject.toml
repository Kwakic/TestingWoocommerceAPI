[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# pythonpath = ["EcommerceAPI/src"] tells pytest to insert that path on sys.path so tests can import your framework
# without installing it. It’s a convenient hack but not ideal long-term.
# NOTE!!!: I recommend removing/commenting it and instead use an editable install: pip install -e './EcommerceAPI[dev]'
# That makes imports work without modifying sys.path and is more robust for local dev and CI.
# If you must keep pythonpath, keep it here (but prefer editable install instead):
#pythonpath = ["EcommerceAPI/src"]


# Default CLI options
# If you see a warning at the end of the log, and you want to display the message run following command:
# pytest -m tcid333 -q -o addopts="" -r w or remove below: --disable-warnings
addopts = "--alluredir=reports/allure-results -ra -q --maxfail=1 --tb=short"


# Ignore unknown-mark warnings for documented markers
filterwarnings = [
  "ignore::pytest.PytestUnknownMarkWarning",
  "ignore:Module already imported so cannot be rewritten:pytest.PytestAssertRewriteWarning",
]

# Logging
log_cli = true
log_cli_level = "DEBUG"
log_cli_format = "[%(asctime)s] [%(levelname)-8s] [🧪 %(nodeid)s] [🔗 %(correlation_id)s] %(message)s"
log_cli_date_format = "%H:%M:%S"
log_auto_indent = true

# Markers (document them so pytest doesn't warn)
# Define all valid pytest markers used across the suite. Helps both documentation and avoids “unknown marker” warnings.
markers = [
  "preflight: Environment, DB, and API readiness checks (run first in CI).",
  "schema: Schema validation for API responses.",
  "api: Full API coverage (CRUD, filters, edge cases).",
  "smoke: Minimal subset for quick verification.",
  "regression: Full regression suite (runs after preflight).",
  "integration: Multi-service or DB integration tests.",
  "performance: Optional stress/load checks (not default).",
  "skip_auth: Skip authentication-dependent tests.",
  "skip_rate_limit: Skip tests affected by API rate limiting.",
]

# -------------------------------------------------------------------------------------------------
# 🧰 OPTIONAL BEHAVIOR / REPORTING
# -------------------------------------------------------------------------------------------------
# Uncomment to produce JUnit XML results by default (CI often enables this explicitly)
# junitxml = reports/junit.xml

# -------------------------------------------------------------------------------------------------
# 🧭 DOCUMENTATION NOTE
# -------------------------------------------------------------------------------------------------
# In CI (GitHub Actions):
#   - The preflight job runs first via `pytest -m preflight`
#   - The full test suite runs only if preflight passes
# Locally:
#   - Developers can run: pytest -m preflight -s -q -r s
#   - Or run the full suite: pytest -m api -s
# -------------------------------------------------------------------------------------------------